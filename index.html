<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA ULTRA OMNI | 8A7 PRIVATE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00fff2;
            --bg-dark: #020617;
            --card-glass: rgba(15, 23, 42, 0.7);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none; /* Chống copy */
            -webkit-user-drag: none;
        }

        /* Hiệu ứng Background Nano-Grid */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 242, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 242, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        .neon-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 242, 0.15) 0%, transparent 70%);
            filter: blur(60px); z-index: -1; pointer-events: none;
        }

        /* Card 3D Effect */
        .premium-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.1);
        }

        .btn-action {
            background: linear-gradient(135deg, #00fff2 0%, #0088ff 100%);
            color: #001e26;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }

        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 242, 0.4);
        }

        /* Input Custom */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.2);
        }

        /* Animation cho câu hỏi */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .q-animate { animation: slideUp 0.6s ease forwards; }

        /* Chống chuột phải */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="grid-bg"></div>
    <div class="neon-glow" id="mouseGlow"></div>

    <div id="app" class="min-h-screen flex flex-col items-center p-6">
        <nav class="w-full max-w-6xl flex justify-between items-center py-6 opacity-0" id="nav">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 border-2 border-cyan-400 rounded-full flex items-center justify-center font-black text-cyan-400">G</div>
                <span class="text-xl font-bold tracking-tighter">GAYZOTA <span class="font-light text-cyan-400">8A7</span></span>
            </div>
            <div id="status" class="px-4 py-2 bg-cyan-400/10 border border-cyan-400/20 rounded-full text-xs font-bold text-cyan-400 uppercase tracking-widest">
                System Secure
            </div>
        </nav>

        <div id="loginPage" class="mt-20 w-full max-w-md premium-card p-10 text-center">
            <h1 class="text-5xl font-black mb-2 italic">ULTRA<br><span class="text-cyan-400">SYSTEM</span></h1>
            <p class="text-slate-400 text-sm mb-10 font-medium">Xác thực quyền truy cập học sinh 8A7</p>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="u-name" placeholder="Họ và tên thí sinh" class="glass-input text-center">
                <input type="text" id="u-class" placeholder="Mã định danh lớp" class="glass-input text-center">
                <button onclick="bootSystem()" class="btn-action py-5 rounded-2xl mt-4">Initialize Data</button>
            </div>
        </div>

        <div id="dashboard" class="hidden w-full max-w-6xl mt-10 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="startQuiz()" class="premium-card p-12 flex flex-col items-center cursor-pointer group">
                <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">📝</div>
                <h3 class="text-2xl font-bold">VÀO THI</h3>
                <p class="text-slate-400 text-sm mt-2">Đề thi đã được niêm phong</p>
            </div>
            <div class="premium-card p-12 flex flex-col items-center opacity-50 cursor-not-allowed">
                <div class="text-6xl mb-6">🏆</div>
                <h3 class="text-2xl font-bold">BẢNG VÀNG</h3>
                <p class="text-slate-400 text-sm mt-2">Đang đồng bộ dữ liệu...</p>
            </div>
            <div class="premium-card p-12 flex flex-col items-center">
                <div id="timer" class="text-5xl font-black text-cyan-400">15:00</div>
                <p class="text-slate-400 text-sm mt-4 font-bold uppercase tracking-widest">Thời gian còn lại</p>
            </div>
        </div>

        <div id="examArea" class="hidden w-full max-w-4xl mt-10">
            <div id="questionsContainer" class="space-y-8"></div>
            <button onclick="submitFinal()" class="w-full btn-action py-8 rounded-[32px] mt-12 text-2xl italic">Kết thúc & Gửi bảo mật</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH & BẢO MẬT TỐI TÂN ---
        const SECURE_MODE = true;

        // 1. Chặn Inspect & View Source (Phát hiện phím)
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.shiftKey && e.key === 'i') || e.key === 'F12') {
                e.preventDefault();
                alert("ACCESS DENIED: Hệ thống đã ghi nhận hành vi xâm nhập.");
            }
        });

        // 2. Chống Console (Cực mạnh)
        if (SECURE_MODE) {
            let threshold = 160;
            setInterval(() => {
                if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                    document.body.innerHTML = "<div style='color:cyan; font-family:sans-serif; text-align:center; margin-top:20%'><h1>PHÁT HIỆN GIAN LẬN!</h1><p>Hệ thống tự động khóa. F5 để thử lại.</p></div>";
                }
            }, 1000);

            // Debugger Trap: Khiến Console bị treo
            (function() {
                (function a() {
                    try { (function b(i) { if ((''+(i/i)).length !== 1 || i % 20 === 0) { (function() { }).constructor('debugger')(); } else { debugger; } b(++i); })(0); } catch (e) { setTimeout(a, 5); }
                })();
            })();
        }

        // 3. Hiệu ứng chuột
        const glow = document.getElementById('mouseGlow');
        window.addEventListener('mousemove', e => {
            gsap.to(glow, { x: e.clientX - 200, y: e.clientY - 200, duration: 1.2, ease: "power2.out" });
        });

        // --- HỆ THỐNG LOGIC ---
        let userData = { name: '', class: '', answers: [], score: 0 };
        const dummyExams = [
            { q: "Nội dung bài thơ 'Sang Thu' của Hữu Thỉnh nói về điều gì?", opts: ["Giao mùa thu", "Tình yêu", "Chiến tranh", "Gia đình"], c: 0 },
            { q: "Tác giả của 'Chị em họ' là ai?", opts: ["Phan Thị Vàng Anh", "Nguyễn Nhật Ánh", "Nam Cao", "Tô Hoài"], c: 0 }
        ];

        function bootSystem() {
            const name = document.getElementById('u-name').value;
            if(!name) return;
            
            userData.name = name;
            gsap.to("#loginPage", { opacity: 0, y: -50, duration: 0.5, onComplete: () => {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('nav').style.opacity = '1';
                gsap.from("#dashboard", { scale: 0.8, opacity: 0, duration: 1, ease: "elastic.out(1, 0.5)" });
            }});
        }

        function startQuiz() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('examArea').classList.remove('hidden');
            
            const container = document.getElementById('questionsContainer');
            container.innerHTML = dummyExams.map((q, i) => `
                <div class="premium-card p-10 q-animate" style="animation-delay: ${i*0.2}s">
                    <span class="text-cyan-400 font-bold text-xs tracking-widest uppercase">Câu hỏi ${i+1}</span>
                    <h2 class="text-2xl font-bold mt-4 mb-8">${q.q}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${q.opts.map((opt, oi) => `
                            <button onclick="pick(${i}, ${oi})" id="opt-${i}-${oi}" class="glass-input text-left hover:bg-white/10 transition-colors">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function pick(qi, oi) {
            userData.answers[qi] = oi;
            // Clear style cũ
            document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(el => el.classList.remove('border-cyan-400', 'bg-cyan-400/10'));
            // Active mới
            document.getElementById(`opt-${qi}-${oi}`).classList.add('border-cyan-400', 'bg-cyan-400/10');
        }

        function submitFinal() {
            let correctCount = 0;
            dummyExams.forEach((q, i) => {
                if(userData.answers[i] === q.c) correctCount++;
            });
            
            userData.score = (correctCount / dummyExams.length) * 10;
            
            document.getElementById('app').innerHTML = `
                <div class="mt-40 text-center q-animate">
                    <h2 class="text-xl text-cyan-400 font-bold uppercase tracking-[1em] mb-4">Final Protocol</h2>
                    <div class="text-[180px] font-black leading-none italic">${userData.score}</div>
                    <p class="text-2xl font-light opacity-50">Dữ liệu đã được mã hóa và gửi tới máy chủ.</p>
                    <button onclick="location.reload()" class="btn-action px-12 py-4 rounded-full mt-10">System Reboot</button>
                </div>
            `;
        }
    </script>
</body>
</html>
