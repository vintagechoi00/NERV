<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA PREMIUM - 8A7 EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --color-primary-start: #2563eb;
            --color-primary-end: #7c3aed;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: #f0f4f8; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
        .text-gradient { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-gradient { background: var(--gradient-primary); color: white; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }
        .opt-btn { width: 100%; text-align: left; padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 12px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; background: white; margin-bottom: 8px; }
        .opt-btn:hover { border-color: var(--color-primary-end); background-color: #f5f3ff; }
        .opt-btn.selected { border-color: var(--color-primary-end); background-color: #eef2ff; }
        .opt-label { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #cbd5e1; font-weight: 800; font-size: 13px; color: #64748b; }
        .selected .opt-label { background: var(--gradient-primary); color: white; border-color: transparent; }
        .q-circle { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; background: white; color: #64748b; }
        .q-circle.answered { background: var(--gradient-primary); color: white; border-color: transparent; }
        .opt-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .opt-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        html { scroll-behavior: smooth; }
        .question-block { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px dashed #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav id="navbar" class="hidden sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg" style="background: var(--gradient-primary);">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-inner font-black text-violet-600">A</div>
            <span class="font-extrabold text-2xl tracking-tighter text-white">GAYZOTA <span class="font-light opacity-80">8A7</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="userDisplay" class="text-white font-bold bg-white/20 px-4 py-2 rounded-full"></span>
            <button onclick="location.reload()" class="text-white">THOÁT</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- Login -->
        <div id="loginPage" class="mt-24 max-w-md mx-auto glass-card p-10">
            <h1 class="text-3xl font-black text-center text-gradient uppercase mb-8 italic">GAYZOTA CLOUD</h1>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl border outline-none">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl border outline-none">
                <button onclick="handleLogin()" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl text-lg">ĐĂNG NHẬP</button>
                <div id="loginError" class="text-red-500 text-center hidden">Sai mật khẩu!</div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="hidden mt-10 space-y-8">
            <div class="glass-card p-10 text-center text-white" style="background: var(--gradient-primary);">
                <h2 class="text-3xl font-extrabold italic">Chào, <span id="welcomeUser"></span>! 👋</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                <button onclick="showSection('selectExamPage')" class="glass-card p-8">✍️ <span class="font-bold block">Vào thi</span></button>
                <button onclick="showSection('resultBoard')" class="glass-card p-8">🏆 <span class="font-bold block">Bảng vàng</span></button>
                <button id="adminBtn" onclick="showSection('adminPage')" class="hidden glass-card p-8">⚙️ <span class="font-bold block">Quản lý đề</span></button>
            </div>
        </div>

        <!-- Select Exam -->
        <div id="selectExamPage" class="hidden mt-6">
            <button onclick="showSection('mainMenu')" class="text-gray-500 mb-4">← Quay lại</button>
            <div id="userExamList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- Exam Page -->
        <div id="examPage" class="hidden mt-4">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3">
                    <div id="questionsContainer" class="glass-card p-8 md:p-12 min-h-[500px]"></div>
                </div>
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass-card p-8 text-center sticky top-24">
                        <div id="timerDisplay" class="text-5xl font-black text-gradient tabular-nums">15:00</div>
                        <button onclick="finishExam()" class="w-full py-4 bg-red-500 text-white rounded-2xl font-black mt-6">NỘP BÀI</button>
                        <div id="questionMap" class="flex flex-wrap gap-2 mt-6"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result -->
        <div id="resultPage" class="hidden mt-10 max-w-2xl mx-auto text-center glass-card p-16">
            <div id="finalScore" class="text-[120px] font-black text-gradient leading-none">0</div>
            <div id="statCorrect" class="text-xl font-bold my-8"></div>
            <div id="roastMessage" class="text-2xl font-black italic mb-8"></div>
            <div class="flex gap-4">
                <button onclick="showReview()" class="flex-1 bg-violet-50 text-violet-700 font-bold py-4 rounded-2xl">Xem đáp án</button>
                <button onclick="showSection('mainMenu')" class="flex-1 bg-slate-800 text-white font-bold py-4 rounded-2xl">Về trang chủ</button>
            </div>
        </div>

        <!-- Review -->
        <div id="reviewPage" class="hidden mt-6 space-y-6">
            <div id="reviewContent" class="space-y-6"></div>
        </div>

        <!-- Admin -->
        <div id="adminPage" class="hidden mt-6 glass-card p-10 max-w-4xl mx-auto">
            <button onclick="showSection('mainMenu')" class="text-gray-500 mb-6">← Quay lại</button>
            <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full p-4 rounded-xl border mb-4">
            <textarea id="rawInput" class="w-full h-80 p-5 rounded-xl border font-mono text-sm mb-4" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án 1 @t&#10;B. Đáp án 2"></textarea>
            <button onclick="saveExamAction()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">LƯU LÊN MÂY</button>
            <div id="adminExamListContent" class="mt-8 space-y-3"></div>
        </div>

        <!-- Bảng Vàng -->
        <div id="resultBoard" class="hidden mt-10 glass-card p-10 max-w-5xl mx-auto">
            <button onclick="showSection('mainMenu')" class="text-gray-500 mb-6">← Quay lại</button>
            <h2 class="text-3xl font-black text-gradient text-center mb-10">BẢNG VÀNG LỚP 8A7</h2>
            <table class="w-full text-left">
                <tbody id="resultTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // TỰ DÁN URL VÀ KEY CHO MÀY LUÔN
        const SUPABASE_URL = 'https://owfudlqolibgipsbtejm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZnVkbHFvbGliZ2lwc2J0ZWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTU2NzMsImV4cCI6MjA4ODYzMTY3M30.3gBJy-umboXye70MKe7rqTOtseW0Ay1kBfBI_FPrZoE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USERS = { 'mrduc': 'admin8a7', 'hoanggay': 'missgay', 'hocsinh': '123456' };
        let exams = [], history = [], state = { user: '', exam: null, timer: null, time: 900, userAnswers: [] };

        async function syncDB() {
            const { data: ex } = await _supabase.from('exams').select('*').order('id', { ascending: false });
            if(ex) exams = ex;
            const { data: hi } = await _supabase.from('history').select('*').order('score', { ascending: false });
            if(hi) history = hi;
        }

        function showSection(id) {
            document.querySelectorAll('body > div > div').forEach(s => { if(s.id !== 'navbar') s.classList.add('hidden'); });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'resultBoard') renderResultBoard();
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                document.getElementById('userDisplay').innerText = `Chào, ${u.toUpperCase()}`;
                document.getElementById('welcomeUser').innerText = u.toUpperCase();
                document.getElementById('navbar').classList.remove('hidden');
                if(u === 'mrduc' || u === 'hoanggay') document.getElementById('adminBtn').classList.remove('hidden');
                await syncDB();
                showSection('mainMenu');
            } else document.getElementById('loginError').classList.remove('hidden');
        }

        async function saveExamAction() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;
            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return { q: lines[0].trim(), opts: lines.slice(1).map(l => ({ t: l.replace('@t','').substring(2).trim(), c: l.includes('@t') })) };
            });
            await _supabase.from('exams').insert([{ title, questions }]);
            alert("Đã lưu lên mây!");
            await syncDB(); renderAdminExams();
        }

        function renderAdminExams() {
            document.getElementById('adminExamListContent').innerHTML = exams.map(ex => `<div class="p-4 bg-white border rounded-xl flex justify-between"><b>${ex.title}</b><button onclick="deleteExam(${ex.id})" class="text-red-500 font-bold">XÓA</button></div>`).join('');
        }

        async function deleteExam(id) {
            await _supabase.from('exams').delete().eq('id', id);
            await syncDB(); renderAdminExams();
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = exams.map(ex => `<button onclick="startExam(${ex.id})" class="glass-card p-8 text-left uppercase font-black">${ex.title}</button>`).join('');
        }

        function startExam(id) {
            state.exam = exams.find(e => e.id === id);
            state.time = 900; state.userAnswers = new Array(state.exam.questions.length).fill(null);
            showSection('examPage'); renderQuestions(); startTimer();
        }

        function startTimer() {
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.time <= 0) finishExam();
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer'); container.innerHTML = '';
            state.exam.questions.forEach((q, qi) => {
                const block = document.createElement('div'); block.className = 'question-block';
                block.id = `q-block-${qi}`;
                block.innerHTML = `<p class="font-bold text-xl mb-4">Câu ${qi+1}: ${q.q}</p><div class="space-y-2">` + 
                    q.opts.map((o, oi) => `<button onclick="selectOpt(${qi}, ${oi})" class="opt-btn ${state.userAnswers[qi]?.selected===o.t?'selected':''}"><div class="opt-label">${String.fromCharCode(65+oi)}</div>${o.t}</button>`).join('') + `</div>`;
                container.appendChild(block);
            });
            renderMap();
        }

        function selectOpt(qi, oi) {
            const q = state.exam.questions[qi]; const o = q.opts[oi];
            state.userAnswers[qi] = { q: q.q, selected: o.t, opts: q.opts, isRight: o.c };
            renderQuestions();
        }

        function renderMap() {
            document.getElementById('questionMap').innerHTML = state.exam.questions.map((_, i) => `<div onclick="scrollToQ(${i})" class="q-circle ${state.userAnswers[i]?'answered':''}">${i+1}</div>`).join('');
        }

        function scrollToQ(i) { document.getElementById(`q-block-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); }

        async function finishExam() {
            clearInterval(state.timer);
            const corrects = state.userAnswers.filter(a => a?.isRight).length;
            const score = Math.round((corrects / state.exam.questions.length) * 10 * 10) / 10;
            const now = new Date();
            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('statCorrect').innerText = `Đúng: ${corrects}/${state.exam.questions.length} câu`;
            document.getElementById('roastMessage').innerText = score === 10 ? "BÁ ĐẠO!" : (score >= 5 ? "TẠM ĐƯỢC!" : "HỌC LẠI ĐI!");
            await _supabase.from('history').insert([{ name: state.user, exam: state.exam.title, score, date: `${now.getDate()}/${now.getMonth()+1}`, timestamp: now.getTime() }]);
        }

        function renderResultBoard() {
            document.getElementById('resultTableBody').innerHTML = history.map((h, i) => `<tr class="border-b h-16"><td class="font-black pr-4">${i+1}</td><td><b>${h.name.toUpperCase()}</b><br><small>${h.exam}</small></td><td class="text-right text-2xl font-black text-violet-600">${h.score}</td></tr>`).join('');
        }

        function showReview() {
            showSection('reviewPage');
            document.getElementById('reviewContent').innerHTML = state.userAnswers.map((ans, i) => `
                <div class="glass-card p-8"><p class="font-bold mb-4">Câu ${i+1}: ${ans?.q || 'Bỏ trống'}</p>
                    ${ans ? ans.opts.map(o => `<div class="p-3 border rounded-xl mb-2 ${o.c?'opt-correct':(o.t===ans.selected?'opt-wrong':'')}">${o.t}</div>`).join('') : ''}
                </div>`).join('');
        }
    </script>
</body>
</html>
