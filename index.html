<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERD SYSTEM - 8A7 PRIVATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f97316; 
            --secondary: #fbbf24; 
            --bg-gradient: radial-gradient(circle at top right, #261205, #0a0a0a);
            --text-main: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(249, 115, 22, 0.2);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-gradient: radial-gradient(circle at top right, #fff7ed, #f1f5f9);
            --text-main: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(249, 115, 22, 0.3);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main); min-height: 100vh; user-select: none;
            -webkit-user-select: none;
            transition: background 0.5s ease, color 0.3s ease;
        }
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 28px;
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: black; font-weight: 800; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.4);
        }
        .btn-premium:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 35px -10px rgba(251, 191, 36, 0.5); }
        
        .btn-review-custom {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary); font-weight: 800; transition: all 0.3s;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        [data-theme="light"] .btn-review-custom { background: white; }
        .btn-review-custom:hover { background: var(--primary); color: white; transform: scale(1.05); }

        .nerv-logo-img {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: black; font-size: 28px; font-weight: 900;
            border-radius: 14px;
            transform: rotate(-10deg);
            filter: drop-shadow(0 4px 12px rgba(249, 115, 22, 0.5));
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nerv-logo-img span { transform: rotate(10deg); display: inline-block; }
        .nerv-logo-img:hover { transform: scale(1.1) rotate(0deg); filter: drop-shadow(0 0 20px var(--primary)); }
        
        .opt-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 18px 24px; border-radius: 18px; cursor: pointer; transition: 0.2s;
        }
        [data-theme="light"] .opt-card { background: rgba(0,0,0,0.03); }
        .opt-card:hover { background: rgba(249, 115, 22, 0.1); border-color: var(--primary); }
        .opt-card.selected {
            background: linear-gradient(90deg, rgba(249, 115, 22, 0.2), rgba(251, 191, 36, 0.2));
            border-color: var(--primary); box-shadow: inset 0 0 15px rgba(249, 115, 22, 0.1);
        }

        .opt-review { padding: 14px 20px; border-radius: 14px; margin-bottom: 8px; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); }
        .opt-correct { background: rgba(34, 197, 94, 0.2) !important; border-color: #22c55e !important; color: #16a34a; }
        .opt-wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #dc2626; }

        .nav-dot {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: rgba(255, 255, 255, 0.05); font-weight: 800; transition: 0.3s;
        }
        [data-theme="light"] .nav-dot { background: rgba(0,0,0,0.05); }
        
        input, textarea { background: var(--input-bg) !important; border: 1px solid rgba(249,115,22,0.2) !important; color: var(--text-main) !important; }

        .switch-container { display: flex; align-items: center; gap: 8px; margin-right: 15px; }
        .theme-switch { position: relative; width: 44px; height: 22px; cursor: pointer; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 34px; transition: 0.4s;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            border-radius: 50%; transition: 0.4s;
        }
        input:checked + .slider:before { transform: translateX(22px); }
        [data-theme="light"] .slider { background: rgba(0, 0, 0, 0.05); }

        .timer-progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--primary); width: 100%; z-index: 1000; transition: width 1s linear; }
        #cheatGuard { position: fixed; inset: 0; background: rgba(220, 38, 38, 0.95); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); text-align: center; }

        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="timerBar" class="timer-progress hidden"></div>
    <div id="cheatGuard">
        <div class="p-10 text-white">
            <h1 class="text-6xl font-black italic mb-4">GIAO DIỆN BỊ KHÓA</h1>
            <p class="text-xl tracking-widest opacity-80 uppercase">ĐANG LÀM BÀI MÀ ĐI ĐÂU VẬY E?</p>
            <button onclick="document.getElementById('cheatGuard').style.display='none'" class="mt-10 px-10 py-4 bg-white text-black font-black rounded-full italic">TÔI ĐÃ HIỂU</button>
        </div>
    </div>

    <div id="confirmModal" class="hidden confirm-overlay">
        <div class="glass p-10 max-w-sm w-full text-center border-2 border-orange-500/50">
            <h3 class="text-2xl font-black text-orange-500 mb-4 italic uppercase">Xác nhận</h3>
            <p id="confirmText" class="text-xs mb-8 tracking-widest opacity-80 uppercase leading-relaxed"></p>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 btn-premium py-4 rounded-xl font-black text-black uppercase text-xs">Đồng ý</button>
                <button id="confirmNo" class="flex-1 glass py-4 rounded-xl font-bold uppercase text-xs hover:bg-white/10">Hủy bỏ</button>
            </div>
        </div>
    </div>

    <div id="app" class="p-4 md:p-10 max-w-7xl mx-auto">
        <header id="header" class="hidden flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="nerv-logo-img" onclick="showSection('mainMenu')"><span>N</span></div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight uppercase">NERD <span class="text-orange-500">SYSTEM</span></h1>
                    <p id="userTag" class="text-[10px] font-bold opacity-50 uppercase tracking-[0.2em]"></p>
                </div>
            </div>
            
            <div class="flex items-center">
                <div class="switch-container">
                    <label class="theme-switch">
                        <input type="checkbox" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="flex gap-2">
                    <button onclick="showSection('mainMenu')" class="glass px-6 py-2 text-xs font-bold hover:bg-white/10 transition text-orange-500">TRANG CHỦ</button>
                    <button onclick="location.reload()" class="glass px-6 py-2 text-xs font-bold hover:bg-red-500/20 transition">ĐĂNG XUẤT</button>
                </div>
            </div>
        </header>

        <div id="loginPage" class="max-w-md mx-auto mt-20 glass p-10 shadow-2xl">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black mb-2 tracking-tighter italic">NERD <span class="text-orange-500">V3.5</span></h2>
                <p class="opacity-60 text-sm">Hệ thống học tập Lớp 8A7</p>
            </div>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Tên của bạn..." class="w-full p-4 rounded-2xl outline-none">
                <input type="text" id="userClass" placeholder="Lớp (VD: 8A7)..." class="w-full p-4 rounded-2xl outline-none">
                <button onclick="handleLogin()" class="w-full btn-premium py-5 rounded-2xl text-lg mt-4 uppercase tracking-widest">ĐĂNG NHẬP</button>
            </div>
        </div>

        <div id="mainMenu" class="hidden grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="showSection('selectExamPage')" class="glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-orange-500">
                <div class="text-6xl mb-6">📝</div><h3 class="text-2xl font-black">LÀM BÀI TẬP</h3>
            </div>
            <div onclick="showSection('leaderboard')" class="glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-yellow-500">
                <div class="text-6xl mb-6">📊</div><h3 class="text-2xl font-black">BẢNG XẾP HẠNG</h3>
            </div>
            <div id="adminBtn" onclick="showSection('adminPage')" class="hidden glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-dashed border-slate-600">
                <div class="text-6xl mb-6">⚙️</div><h3 class="text-2xl font-black">QUẢN TRỊ</h3>
            </div>
        </div>

        <div id="selectExamPage" class="hidden">
            <h2 class="text-4xl font-black mb-10 uppercase italic">Chọn <span class="text-orange-500">Bài Tập</span></h2>
            <div id="examList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="examPage" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1 glass p-8 md:p-12 max-h-[80vh] overflow-y-auto space-y-12 transition-all duration-500" id="questionArea"></div>
                <div class="w-full lg:w-80 space-y-6">
                    <div class="glass p-8 text-center sticky top-10">
                        <div id="timer" class="text-5xl font-black text-orange-500 tracking-tighter">15:00</div>
                        <button onclick="customConfirm('BẠN CÓ CHẮC MUỐN NỘP BÀI KHÔNG?', submitExam)" class="w-full mt-6 py-4 bg-red-600 rounded-2xl font-black text-white">NỘP BÀI</button>
                    </div>
                    <div class="glass p-6"><div id="questionMap" class="flex flex-wrap gap-2"></div></div>
                </div>
            </div>
        </div>

        <div id="resultPage" class="hidden flex flex-col items-center justify-center text-center py-20">
            <h2 class="text-orange-500 font-black tracking-[0.5em] mb-4 uppercase">Hoàn Thành</h2>
            <div class="text-[150px] font-black italic leading-none" id="finalScoreDisplay">0</div>
            <p id="timeFinish" class="text-orange-500/60 font-bold uppercase tracking-widest mb-6"></p>
            <div class="flex flex-col gap-4 mt-10">
                <button onclick="showSection('mainMenu')" class="btn-premium px-12 py-5 rounded-full">QUAY VỀ MENU</button>
                <button onclick="showSection('reviewPage')" class="btn-review-custom px-12 py-4 rounded-full text-sm">XEM LẠI ĐÁP ÁN</button>
            </div>
        </div>

        <div id="reviewPage" class="hidden max-w-3xl mx-auto">
             <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic uppercase">Xem lại <span class="text-orange-500">Đáp án</span></h2>
                <button onclick="showSection('resultPage')" class="glass px-6 py-2 text-xs font-bold text-orange-500">QUAY LẠI</button>
             </div>
             <div id="reviewContent" class="space-y-8 pb-20"></div>
        </div>

        <div id="adminPage" class="hidden max-w-4xl mx-auto glass p-10">
            <h2 class="text-3xl font-black mb-8 italic text-orange-500">HỆ THỐNG QUẢN TRỊ</h2>
            <div class="space-y-6">
                <input type="text" id="examTitle" placeholder="Tên bài tập..." class="w-full p-5 rounded-2xl outline-none">
                <textarea id="rawInput" rows="10" class="w-full p-5 rounded-2xl font-mono text-sm outline-none" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án sai&#10;B. Đáp án đúng @t"></textarea>
                <div id="statusMsg" class="hidden text-center font-black text-lg py-2 uppercase tracking-widest"></div>
                <div class="flex gap-4">
                    <button id="saveBtn" onclick="handleSaveExam()" class="flex-1 btn-premium py-5 rounded-2xl">LƯU DỮ LIỆU</button>
                    <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden glass px-8 py-5 rounded-2xl font-bold text-xs">HỦY</button>
                </div>
                <div id="adminExamList" class="pt-10 space-y-3"></div>
            </div>
        </div>

        <div id="leaderboard" class="hidden max-w-4xl mx-auto glass p-10">
            <h2 class="text-4xl font-black mb-10 text-center italic uppercase">Bảng <span class="text-orange-500">Xếp Hạng</span></h2>
            <div id="leaderboardContent" class="space-y-4"></div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            if(current === 'light') { document.body.removeAttribute('data-theme'); } 
            else { document.body.setAttribute('data-theme', 'light'); }
        }

        const SB_URL = 'https://fzlbtemrspagisfjvaxs.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bGJ0ZW1yc3BhZ2lzZmp2YXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzUzNjQsImV4cCI6MjA4OTQxMTM2NH0.-LXJQxRZKZOFgQO9NhURTQC3nztcKQ0Ir62kHuup1ek';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        let state = { user: '', displayUser: '', class: '', exams: [], currentExam: null, userAns: [], timer: null, time: 900, editingId: null, finalScore: 0 };

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && state.currentExam) {
                document.getElementById('cheatGuard').style.display = 'flex';
            }
        });

        function showStatus(text, isError = false) {
            const msg = document.getElementById('statusMsg');
            msg.innerText = text;
            msg.className = `text-center font-black text-lg py-2 uppercase tracking-widest transition-all duration-300 ${isError ? 'text-red-500' : 'text-orange-500'}`;
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2500);
        }

        function customConfirm(text, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmText').innerText = text;
            modal.classList.remove('hidden');
            modal.style.display = 'flex'; 
            document.getElementById('confirmYes').onclick = () => { modal.style.display = 'none'; modal.classList.add('hidden'); onConfirm(); };
            document.getElementById('confirmNo').onclick = () => { modal.style.display = 'none'; modal.classList.add('hidden'); };
        }

        async function handleLogin() {
            const rawName = document.getElementById('username').value.trim();
            const c = document.getElementById('userClass').value.trim();
            if(!rawName || !c) return showStatus("NHẬP ĐỦ THÔNG TIN!", true);
            
            state.user = rawName;
            state.displayUser = rawName;
            state.class = c;

            const adminPattern = /^(wattman|nikagay)\("(.+)"\)$/i;
            const match = rawName.match(adminPattern);
            
            if(match) {
                state.displayUser = match[2]; 
                document.getElementById('adminBtn').classList.remove('hidden');
            } else {
                document.getElementById('adminBtn').classList.add('hidden');
            }
            
            document.getElementById('userTag').innerText = `${state.displayUser} // ${c}`;
            await fetchExams();
            showSection('mainMenu');
            document.getElementById('header').classList.replace('hidden', 'flex');
        }

        async function fetchExams() {
            const { data } = await _sb.from('exams').select('*').order('id', { ascending: false });
            state.exams = data || [];
        }

        function showSection(id) {
            ['loginPage', 'mainMenu', 'selectExamPage', 'examPage', 'adminPage', 'leaderboard', 'resultPage', 'reviewPage'].forEach(s => {
                const el = document.getElementById(s); if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderExamList();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'leaderboard') renderLeaderboard();
            if(id === 'reviewPage') renderReview();
            if(id !== 'examPage') document.getElementById('timerBar').classList.add('hidden');
        }

        function renderExamList() {
            document.getElementById('examList').innerHTML = state.exams.map(ex => `
                <div onclick="startExam(${ex.id})" class="glass p-8 cursor-pointer border-l-4 border-orange-500 hover:bg-orange-500/10 transition">
                    <h3 class="text-xl font-bold">${ex.title}</h3>
                    <p class="text-xs opacity-50 mt-2 uppercase tracking-widest">${ex.questions ? ex.questions.length : 0} CÂU HỎI | 15:00</p>
                </div>
            `).join('');
        }

        function startExam(id) {
            const ex = state.exams.find(e => e.id === id);
            if (!ex || !ex.questions) return;
            
            // XÁO TRỘN CÂU HỎI
            let shuffledQuestions = [...ex.questions].sort(() => Math.random() - 0.5);
            
            // XÁO TRỘN TẤT CẢ ĐÁP ÁN TRONG TỪNG CÂU
            shuffledQuestions = shuffledQuestions.map(q => {
                return {
                    ...q,
                    opts: [...q.opts].sort(() => Math.random() - 0.5)
                };
            });

            state.currentExam = { ...ex, questions: shuffledQuestions };
            state.userAns = new Array(shuffledQuestions.length).fill(null);
            showSection('examPage'); renderAllQuestions(); startTimer();
            document.getElementById('timerBar').classList.remove('hidden');
        }

        function renderAllQuestions() {
            const area = document.getElementById('questionArea');
            area.innerHTML = state.currentExam.questions.map((q, idx) => `
                <div id="q-container-${idx}" class="space-y-6">
                    <span class="text-orange-500 font-black text-xs tracking-widest uppercase">Câu ${idx + 1} / ${state.currentExam.questions.length}</span>
                    <h2 class="text-2xl font-bold mt-2">${q.q}</h2>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.opts.map((o, oi) => `
                            <div onclick="pick(${idx}, ${oi})" id="opt-${idx}-${oi}" class="opt-card ${state.userAns[idx] === oi ? 'selected' : ''}">
                                <span class="font-bold mr-4 text-orange-500">${String.fromCharCode(65+oi)}.</span> ${o.t}
                            </div>
                        `).join('')}
                    </div>
                </div>
                ${idx < state.currentExam.questions.length - 1 ? '<hr class="opacity-10 border-orange-500">' : ''}
            `).join('');
            renderMap();
        }

        function pick(qi, oi) { 
            state.userAns[qi] = oi; 
            document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
            renderMap(); 
        }

        function renderMap() {
            document.getElementById('questionMap').innerHTML = state.userAns.map((a, i) => `
                <div onclick="document.getElementById('q-container-${i}').scrollIntoView({behavior: 'smooth', block: 'center'})" 
                     class="nav-dot cursor-pointer ${a !== null ? 'bg-orange-500 text-black' : ''}">${i+1}</div>
            `).join('');
        }

        function startTimer() {
            state.time = 900; if(state.timer) clearInterval(state.timer);
            const bar = document.getElementById('timerBar');
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                bar.style.width = (state.time / 900) * 100 + '%';
                if(state.time <= 0) submitExam();
            }, 1000);
        }

        async function submitExam() {
            clearInterval(state.timer);
            document.getElementById('timerBar').classList.add('hidden');
            let correctCount = 0;
            state.currentExam.questions.forEach((q, i) => { 
                const userPick = state.userAns[i];
                if(userPick !== null && q.opts[userPick] && q.opts[userPick].c === true) correctCount++; 
            });
            
            state.finalScore = Math.round((correctCount / state.currentExam.questions.length) * 10 * 10) / 10;
            const timeUsed = 900 - state.time;
            document.getElementById('timeFinish').innerText = `Thời gian: ${Math.floor(timeUsed/60)}phút ${timeUsed%60}giây`;
            
            await _sb.from('history').insert([{ 
                name: `${state.displayUser} (${state.class})`, 
                exam: state.currentExam.title, 
                score: state.finalScore, 
                date: new Date().toLocaleDateString('vi-VN') 
            }]);
            
            showSection('resultPage');
            const scoreEl = document.getElementById('finalScoreDisplay');
            gsap.fromTo(scoreEl, { innerText: 0 }, { 
                innerText: state.finalScore, duration: 2, snap: { innerText: 0.1 },
                onUpdate: function() { scoreEl.innerHTML = parseFloat(scoreEl.innerText).toFixed(1); }
            });
        }

        function renderReview() {
            const content = document.getElementById('reviewContent');
            content.innerHTML = state.currentExam.questions.map((q, i) => {
                const userIdx = state.userAns[i];
                return `<div class="glass p-8">
                    <p class="text-orange-500 font-black text-xs mb-2 uppercase">Câu hỏi ${i+1}</p>
                    <h3 class="text-xl font-bold mb-6">${q.q}</h3>
                    <div class="space-y-3">
                        ${q.opts.map((o, oi) => {
                            let s = o.c ? "opt-correct" : (userIdx === oi ? "opt-wrong" : "");
                            return `<div class="opt-review ${s}">
                                <span class="mr-2">${String.fromCharCode(65+oi)}.</span>${o.t}
                                ${o.c ? ' <span class="text-[10px] ml-2 font-black">(ĐÁP ÁN ĐÚNG)</span>' : ''}
                                ${userIdx === oi && !o.c ? ' <span class="text-[10px] ml-2 font-black">(BẠN CHỌN SAI)</span>' : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        async function handleSaveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return showStatus("DỮ LIỆU CHƯA ĐỦ!", true);
            
            const questionBlocks = text.split(/Câu\s*\d+[:.]/gi).filter(b => b.trim().length > 5);
            
            const questions = questionBlocks.map(block => {
                const lines = block.trim().split('\n').filter(l => l.trim() !== "");
                const qText = lines[0].trim();
                const opts = lines.slice(1).map(line => {
                    const isCorrect = line.includes('@t');
                    let cleanText = line.replace('@t', '').replace(/^\s*[A-Za-z0-9][.:\s\-]+/, '').trim();
                    return { t: cleanText, c: isCorrect };
                });
                return { q: qText, opts: opts };
            });

            if(state.editingId) {
                await _sb.from('exams').update({ title, questions }).eq('id', state.editingId);
            } else {
                await _sb.from('exams').insert([{ title, questions }]);
            }
            showStatus("ĐÃ LƯU!"); cancelEdit(); await fetchExams(); renderAdminExams();
        }

        function editEx(id) {
            const ex = state.exams.find(e => e.id === id);
            state.editingId = id;
            document.getElementById('examTitle').value = ex.title;
            document.getElementById('rawInput').value = ex.questions.map((q, i) => `Câu ${i+1}: ${q.q}\n${q.opts.map((o, oi) => `${String.fromCharCode(65+oi)}. ${o.t}${o.c?' @t':''}`).join('\n')}`).join('\n\n');
            document.getElementById('saveBtn').innerText = "CẬP NHẬT";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        }

        function cancelEdit() {
            state.editingId = null; document.getElementById('examTitle').value = ""; document.getElementById('rawInput').value = "";
            document.getElementById('saveBtn').innerText = "LƯU DỮ LIỆU"; document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function renderAdminExams() {
            document.getElementById('adminExamList').innerHTML = state.exams.map(ex => `
                <div class="flex justify-between items-center p-4 glass text-sm group">
                    <span onclick="editEx(${ex.id})" class="cursor-pointer hover:text-orange-500 transition font-bold uppercase">${ex.title}</span>
                    <button onclick="customConfirm('XÓA BÀI TẬP NÀY?', () => deleteEx(${ex.id}))" class="text-red-500 font-bold opacity-50 group-hover:opacity-100 italic">XÓA</button>
                </div>
            `).join('');
        }

        async function deleteEx(id) {
            const ex = state.exams.find(e => e.id === id);
            await _sb.from('history').delete().eq('exam', ex.title);
            await _sb.from('exams').delete().eq('id', id);
            await fetchExams(); renderAdminExams();
        }

        async function renderLeaderboard() {
            const { data } = await _sb.from('history').select('*').order('score', { ascending: false }).limit(20);
            document.getElementById('leaderboardContent').innerHTML = (data || []).map((h, i) => `
                <div class="glass p-5 flex justify-between items-center">
                    <div class="flex items-center gap-5">
                        <span class="text-2xl font-black ${i<3?'text-orange-500':'opacity-20'}">#${i+1}</span>
                        <div><p class="font-bold uppercase text-sm">${h.name}</p><p class="text-[10px] opacity-40 uppercase">${h.exam}</p></div>
                    </div>
                    <div class="text-3xl font-black text-orange-500">${h.score}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
