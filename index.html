<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA ELITE - 8A7 EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --card-bg: rgba(26, 29, 36, 0.7);
            --neon-blue: #3b82f6;
            --neon-purple: #8b5cf6;
            --gradient-glow: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        /* Glassmorphism xịn xò */
        .glass-card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.1); }

        /* Chữ phát sáng */
        .text-glow {
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }

        /* Nút bấm mượt mà */
        .btn-neon { 
            background: var(--gradient-glow); 
            color: white; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
        }
        .btn-neon::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.1); transform: rotate(45deg); transition: 0.5s; opacity: 0;
        }
        .btn-neon:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); transform: translateY(-2px); }
        .btn-neon:hover::after { opacity: 1; left: 100%; }

        /* Nút chọn đáp án */
        .opt-btn {
            width: 100%; text-align: left; padding: 16px 24px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; font-weight: 600; transition: all 0.2s;
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2);
            margin-bottom: 12px; color: #cbd5e1;
        }
        .opt-btn:hover { border-color: var(--neon-purple); background: rgba(139, 92, 246, 0.05); color: white; transform: translateX(5px); }
        .opt-btn.selected { 
            border: 1px solid var(--neon-purple) !important; 
            background: rgba(139, 92, 246, 0.15) !important; 
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            color: white;
        }

        .opt-label {
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.05); font-weight: 800; font-size: 14px;
        }
        .selected .opt-label { background: var(--gradient-glow); color: white; }

        /* Form Input */
        input, textarea {
            background: rgba(0,0,0,0.3) !important; color: white !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        input:focus, textarea:focus { border-color: var(--neon-purple) !important; outline: none; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }

        /* Chống bôi đen (làm khó copy) */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="min-h-screen pb-10 no-select">

    <div id="cheatWarning" class="hidden fixed inset-0 z-[9999] bg-red-900/90 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center">
        <div class="text-8xl mb-4">⚠️</div>
        <h1 class="text-5xl font-black mb-4">PHÁT HIỆN GIAN LẬN</h1>
        <p class="text-xl font-semibold">Bạn vừa thoát tab hoặc thu nhỏ trình duyệt trong lúc thi!</p>
        <p class="text-gray-300 mt-2">Hệ thống đã ghi nhận hành động này.</p>
        <button onclick="document.getElementById('cheatWarning').classList.add('hidden')" class="mt-8 px-8 py-3 bg-white text-red-900 font-bold rounded-xl hover:bg-gray-200">Tôi đã hiểu</button>
    </div>

    <nav id="navbar" class="hidden sticky top-0 z-50 px-6 py-4 flex justify-between items-center bg-[#0f1115]/80 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-white bg-gradient-to-br from-blue-500 to-purple-600 shadow-lg">E</div>
            <span class="font-extrabold text-2xl tracking-tighter text-white">GAYZOTA <span class="font-light text-purple-400">ELITE</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="userDisplay" class="hidden md:block text-sm font-bold text-white bg-white/10 px-5 py-2.5 rounded-full border border-white/5"></span>
            <button onclick="location.reload()" class="text-gray-400 hover:text-white font-semibold transition-colors">Thoát</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="loginPage" class="mt-32 max-w-md mx-auto glass-card p-10 transform hover:scale-[1.02] transition-transform">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black tracking-tighter uppercase text-glow mb-2">ELITE</h1>
                <p class="text-gray-400 text-sm font-semibold tracking-widest">HỆ THỐNG KHẢO THÍ BẢO MẬT CAO</p>
            </div>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Họ và tên thí sinh" class="w-full p-4 rounded-xl">
                <input type="text" id="userClass" placeholder="Lớp (VD: 8A7)" class="w-full p-4 rounded-xl">
                <button onclick="handleFastLogin()" class="w-full btn-neon font-bold py-4 rounded-xl text-lg mt-4 tracking-widest uppercase">Xác thực</button>
            </div>
        </div>

        <div id="mainMenu" class="hidden mt-10 space-y-8">
            <div class="glass-card p-12 text-center relative overflow-hidden">
                <h2 class="text-4xl font-extrabold relative z-10">Xin chào, <span id="welcomeUser" class="text-glow">Thành viên</span>!</h2>
            </div>
            </div>

    </div>

    <script>
        // BƯỚC 1: ĐIỀN THÔNG TIN SUPABASE MỚI CỦA ÔNG VÀO ĐÂY
        const SUPABASE_URL = 'ĐIỀN_URL_CỦA_ÔNG';
        const SUPABASE_KEY = 'ĐIỀN_ANON_KEY_CỦA_ÔNG';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_NAMES = ['mrduc', 'hoanggay', 'gayzota']; 
        let exams = [], state = { user: '', userClass: '', exam: null, timer: null, time: 900, userAnswers: [], startTime: null, cheatCount: 0 };

        // === CÁC LỚP BẢO VỆ FRONT-END (Chỉ mang tính răn đe) ===

        // 1. Chống Click chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Chặn các phím tắt mở DevTools cơ bản
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U (View Source)
        };

        // 3. TÍNH NĂNG MỚI: ANTI-CHEAT (Theo dõi chuyển tab)
        document.addEventListener("visibilitychange", () => {
            // Nếu đang trong bài thi và ẩn tab
            if (document.hidden && state.timer) {
                state.cheatCount++;
                document.getElementById('cheatWarning').classList.remove('hidden');
                // Có thể trừ điểm hoặc nộp bài luôn ở đây nếu muốn
            }
        });

        // Hàm login
        async function handleFastLogin() {
            const name = document.getElementById('username').value.trim();
            const uClass = document.getElementById('userClass').value.trim();
            if(!name || !uClass) return;
            state.user = name; state.userClass = uClass;
            document.getElementById('userDisplay').innerText = `${name.toUpperCase()} - ${uClass}`;
            document.getElementById('welcomeUser').innerText = name.toUpperCase();
            document.getElementById('navbar').classList.remove('hidden');
            
            // Giấu menu mainMenu đi, hiển thị thông báo đang tải...
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            // Thêm các hàm fetch DB ở đây...
        }

        // Phần logic thi ông copy từ file cũ dán tiếp vào đây, nó sẽ tự ăn CSS mới.
    </script>
</body>
</html>
