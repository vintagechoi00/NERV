<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; color: #334155; }
        .glass-card { background: white; border-radius: 15px; border: 1px solid #f1f5f9; }
        .azota-purple { color: #8b5cf6; }
        .link-style { color: #8b5cf6; font-weight: bold; text-decoration: underline; cursor: pointer; }
        .opt-btn { border: 1.5px solid #f1f5f9; width: 100%; text-align: left; padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        
        /* Thông báo chữ tím tối giản */
        #customToast {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe;
            padding: 10px 25px; border-radius: 30px; font-size: 13px; font-weight: bold;
            z-index: 9999; transition: 0.4s;
        }
        #customToast.show { bottom: 30px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="customToast"></div>

    <nav id="navbar" class="hidden w-full max-w-2xl flex justify-between items-center py-6 mb-4">
        <div class="font-bold azota-purple uppercase text-xl">GAYZOTA</div>
        <button onclick="location.reload()" class="text-[10px] text-red-400 border border-red-100 px-2 py-1 rounded">Thoát</button>
    </nav>

    <!-- ĐĂNG NHẬP -->
    <div id="loginPage" class="glass-card p-10 w-full max-w-sm mt-20 text-center">
        <h2 class="text-2xl font-bold mb-8 azota-purple uppercase underline">GAYZOTA</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full mb-4 p-3 border rounded-lg outline-none">
        <input type="password" id="password" placeholder="Mật khẩu" class="w-full mb-6 p-3 border rounded-lg outline-none">
        <button onclick="handleLogin()" class="w-full bg-[#8b5cf6] text-white font-bold py-3 rounded-lg">ĐĂNG NHẬP</button>
    </div>

    <!-- MENU CHỮ XANH -->
    <div id="mainMenu" class="glass-card p-12 w-full max-w-lg hidden mt-10 text-center">
        <div class="flex flex-col items-center space-y-8">
            <div onclick="showSection('adminPage')" class="link-style text-lg text-orange-500 uppercase">📝 QUẢN LÝ ĐỀ THI</div>
            <div onclick="showSection('selectExamPage')" class="link-style text-xl uppercase">✍️ VÀO THI NGAY</div>
        </div>
    </div>

    <!-- QUẢN LÝ ĐỀ -->
    <div id="adminPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
        <div onclick="showSection('mainMenu')" class="text-[10px] text-gray-400 mb-6 cursor-pointer uppercase">← Quay lại</div>
        <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full mb-4 p-3 border rounded-lg outline-none">
        <textarea id="rawInput" class="w-full h-48 mb-4 p-3 border rounded-lg font-mono text-sm outline-none" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án 1&#10;B. Đáp án đúng @t"></textarea>
        <button onclick="saveExam()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg mb-8 uppercase text-xs">LƯU ĐỀ VÀO MÁY</button>
        <div id="adminExamList" class="space-y-2"></div>
    </div>

    <!-- CHỌN ĐỀ -->
    <div id="selectExamPage" class="glass-card p-10 w-full max-w-lg hidden mt-4 text-center">
        <div onclick="showSection('mainMenu')" class="text-[10px] text-gray-400 mb-8 cursor-pointer uppercase">← Quay lại</div>
        <div id="userExamList" class="flex flex-col space-y-6"></div>
    </div>

    <!-- LÀM BÀI -->
    <div id="examView" class="w-full max-w-2xl hidden mt-4">
        <div class="glass-card p-4 mb-4 flex justify-between items-center px-8">
            <span id="qIdx" class="font-bold azota-purple text-xs uppercase">CÂU 1</span>
            <div id="timer" class="text-lg font-bold text-red-500">15:00</div>
        </div>
        <div class="glass-card p-8">
            <h3 id="qText" class="text-lg font-bold mb-6"></h3>
            <div id="optionsArea"></div>
        </div>
    </div>

    <script>
        let allExams = JSON.parse(localStorage.getItem('g_exams')) || [];
        let state = { user: '', shuffledQs: [], currentIdx: 0, corrects: 0 };

        function notify(msg) {
            const t = document.getElementById('customToast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        function showSection(id) {
            document.querySelectorAll('body > div:not(#customToast)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            if(!u) return notify("Vui lòng nhập tên!");
            state.user = u;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            showSection('mainMenu');
            notify("Chào " + u);
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return notify("Chưa nhập đủ đề!");

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return {
                    qText: lines[0].trim(),
                    opts: lines.slice(1).map(l => ({
                        text: l.replace('@t', '').trim().substring(2).trim(),
                        isCorrect: l.includes('@t')
                    }))
                };
            });
            allExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            notify("Đã lưu đề thành công!");
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg text-xs">
                    <span>${ex.title}</span>
                    <button onclick="deleteExam(${ex.id})" class="text-red-400">XÓA</button>
                </div>
            `).join('');
        }

        function deleteExam(id) {
            allExams = allExams.filter(e => e.id !== id);
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            renderAdmin();
            notify("Đã xóa!");
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="link-style text-lg uppercase" onclick="startExam(${ex.id})">${ex.title}</div>
            `).join('') || 'Chưa có đề';
        }

        function startExam(id) {
            const exam = allExams.find(e => e.id === id);
            state.currentIdx = 0; state.corrects = 0;
            state.shuffledQs = shuffle([...exam.questions]); 
            showSection('examView');
            loadQuestion();
        }

        function loadQuestion() {
            const q = state.shuffledQs[state.currentIdx];
            document.getElementById('qIdx').innerText = `CÂU ${state.currentIdx + 1}`;
            document.getElementById('qText').innerText = q.qText;
            const area = document.getElementById('optionsArea');
            area.innerHTML = '';
            
            shuffle([...q.opts]).forEach(opt => {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                b.innerText = opt.text;
                b.onclick = function() {
                    if(area.style.pointerEvents === 'none') return;
                    area.style.pointerEvents = 'none';
                    this.style.borderColor = opt.isCorrect ? '#22c55e' : '#ef4444';
                    if(opt.isCorrect) state.corrects++;
                    
                    setTimeout(() => {
                        state.currentIdx++;
                        area.style.pointerEvents = 'auto';
                        if(state.currentIdx < state.shuffledQs.length) loadQuestion();
                        else {
                            notify("Điểm: " + ((state.corrects/state.shuffledQs.length)*10).toFixed(1));
                            showSection('mainMenu');
                        }
                    }, 500);
                };
                area.appendChild(b);
            });
        }
    </script>
</body>
</html>
