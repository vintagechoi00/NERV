<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA v3.0 - 8A7 ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-quiz { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .card-quiz:hover { transform: translateY(-4px); border-color: #3B82F6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .choice-btn { transition: all 0.2s; border: 2px solid #e5e7eb; }
        .choice-btn.selected { border-color: #3B82F6; background-color: #eff6ff; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="app" class="max-w-4xl mx-auto px-4 pt-6">
        <!-- Nội dung thay đổi theo State -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG CỦA ĐỨC
        const firebaseConfig = {
            apiKey: "AIzaSyCEsThR9wwwVV_28E2-OrpfULGFOA_Ud7g",
            authDomain: "gayzota-8a7.firebaseapp.com",
            databaseURL: "https://gayzota-8a7-default-rtdb.firebaseio.com",
            projectId: "gayzota-8a7",
            storageBucket: "gayzota-8a7.firebasestorage.app",
            messagingSenderId: "782817082757",
            appId: "1:782817082757:web:395c6b73f1d64fc8fd18ec",
            measurementId: "G-MLJJ2N8NSZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- BIẾN TOÀN CỤC ---
        let currentState = 'login';
        let currentUser = '';
        let questions = JSON.parse(localStorage.getItem('gayzota_questions')) || [];
        let currentAnswers = {};
        let leaderboard = [];

        // --- LẤY DỮ LIỆU TỪ FIREBASE ---
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            leaderboard = data ? Object.values(data).sort((a, b) => b.score - a.score) : [];
            if(currentState === 'leaderboard') renderLeaderboard();
        });

        // --- HÀM GIAO DIỆN ---
        function render() {
            const container = document.getElementById('app');
            if (currentState === 'login') {
                container.innerHTML = `
                    <div class="min-h-[80vh] flex items-center justify-center animate-slide">
                        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border border-white">
                            <div class="text-center mb-8">
                                <div class="w-20 h-20 bg-blue-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-graduation-cap text-3xl text-blue-600"></i>
                                </div>
                                <h1 class="text-4xl font-extrabold gradient-text mb-2">GAYZOTA v3.0</h1>
                                <p class="text-gray-500 font-medium">Hệ thống thi trực tuyến 8A7</p>
                            </div>
                            <div class="space-y-4">
                                <input type="text" id="nameInput" placeholder="Nhập tên của bạn..." class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-blue-400 focus:bg-white outline-none transition-all text-lg">
                                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                                    BẮT ĐẦU THI
                                </button>
                                <button onclick="goToAdmin()" class="w-full py-3 text-gray-400 text-sm font-medium hover:text-blue-500 transition">
                                    <i class="fas fa-user-shield mr-1"></i> Quản lý hệ thống
                                </button>
                            </div>
                        </div>
                    </div>`;
            } else if (currentState === 'quiz') {
                if (questions.length === 0) {
                    container.innerHTML = `<div class="text-center py-20"><p class="text-xl mb-4">Chưa có câu hỏi nào được tạo!</p><button onclick="location.reload()" class="text-blue-500">Quay lại</button></div>`;
                    return;
                }
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-8 animate-slide">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">Bài thi của: ${currentUser}</h2>
                            <p class="text-gray-500">Hãy chọn đáp án đúng nhất</p>
                        </div>
                        <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-100">
                            <span class="text-sm font-bold text-gray-400 uppercase tracking-wider">Thời gian</span>
                            <div class="text-xl font-mono font-bold text-blue-600" id="timer">00:00</div>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${questions.map((q, idx) => `
                            <div class="glass p-8 rounded-[2rem] shadow-sm border border-white animate-slide" style="animation-delay: ${idx * 0.1}s">
                                <h3 class="text-lg font-bold mb-6 flex gap-3">
                                    <span class="flex-shrink-0 w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm">${idx + 1}</span>
                                    ${q.text}
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${q.options.map((opt, optIdx) => `
                                        <button onclick="selectOption(${idx}, ${optIdx})" id="q${idx}o${optIdx}" class="choice-btn text-left p-4 rounded-xl font-medium hover:bg-gray-50 flex items-center gap-3">
                                            <span class="w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs text-gray-400">${String.fromCharCode(65 + optIdx)}</span>
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="submitQuiz()" class="fixed bottom-8 right-8 bg-green-500 text-white px-10 py-4 rounded-2xl font-bold shadow-2xl hover:bg-green-600 hover:scale-110 transition-all z-50">
                        NỘP BÀI <i class="fas fa-paper-plane ml-2"></i>
                    </button>`;
            } else if (currentState === 'leaderboard') {
                renderLeaderboard();
            } else if (currentState === 'admin') {
                renderAdmin();
            }
        }

        // --- LOGIC HÀM ---
        window.handleLogin = () => {
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                currentUser = name;
                currentState = 'quiz';
                render();
            } else alert("Tên gì vậy ông?");
        };

        window.selectOption = (qIdx, optIdx) => {
            currentAnswers[qIdx] = optIdx;
            questions[qIdx].options.forEach((_, i) => {
                document.getElementById(`q${qIdx}o${i}`).classList.remove('selected', 'bg-blue-50');
            });
            document.getElementById(`q${qIdx}o${optIdx}`).classList.add('selected', 'bg-blue-50');
        };

        window.submitQuiz = () => {
            let score = 0;
            questions.forEach((q, i) => {
                if (currentAnswers[i] === parseInt(q.correct)) score++;
            });
            const finalScore = ((score / questions.length) * 10).toFixed(1);
            
            // Gửi lên Firebase
            push(ref(db, 'leaderboard'), {
                name: currentUser,
                score: parseFloat(finalScore),
                time: new Date().toLocaleTimeString()
            });

            currentState = 'leaderboard';
            render();
        };

        function renderLeaderboard() {
            const container = document.getElementById('app');
            container.innerHTML = `
                <div class="text-center mb-10 animate-slide">
                    <h1 class="text-4xl font-black gradient-text">BẢNG VÀNG 8A7</h1>
                    <p class="text-gray-500">Cập nhật kết quả thi thời gian thực</p>
                </div>
                <div class="glass rounded-[2.5rem] overflow-hidden shadow-xl border border-white animate-slide">
                    <table class="w-full">
                        <thead class="bg-gray-50/50">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase">Hạng</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase">Thí sinh</th>
                                <th class="px-6 py-4 text-center text-xs font-bold text-gray-400 uppercase">Điểm số</th>
                                <th class="px-6 py-4 text-right text-xs font-bold text-gray-400 uppercase">Lúc</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${leaderboard.map((user, idx) => `
                                <tr class="${idx < 3 ? 'bg-blue-50/30' : ''}">
                                    <td class="px-6 py-4">
                                        ${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : idx + 1}
                                    </td>
                                    <td class="px-6 py-4 font-bold text-gray-700">${user.name}</td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="px-4 py-1 rounded-full bg-white border font-bold text-blue-600">${user.score}</span>
                                    </td>
                                    <td class="px-6 py-4 text-right text-gray-400 text-sm">${user.time}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="text-center mt-8">
                    <button onclick="location.reload()" class="bg-gray-200 px-8 py-3 rounded-xl font-bold hover:bg-gray-300 transition">THI LẠI</button>
                </div>`;
        }

        window.goToAdmin = () => {
            const pass = prompt("Nhập mật khẩu Admin (mặc định: mrduc):");
            if (pass === 'mrduc') {
                currentState = 'admin';
                render();
            } else alert("Sai pass rồi!");
        };

        function renderAdmin() {
            const container = document.getElementById('app');
            container.innerHTML = `
                <div class="mb-8 flex justify-between items-center">
                    <h1 class="text-3xl font-bold">Quản lý đề thi</h1>
                    <button onclick="currentState='login';render()" class="text-gray-500">Thoát</button>
                </div>
                <div class="glass p-6 rounded-3xl mb-8">
                    <h2 class="font-bold mb-4">Thêm câu hỏi mới</h2>
                    <textarea id="rawQuestion" class="w-full p-4 bg-gray-50 rounded-xl mb-4" rows="3" placeholder="Câu hỏi?|Đáp án A|Đáp án B|Đáp án C|Đáp án D|0 (Số 0 là A đúng, 1 là B đúng...)"></textarea>
                    <button onclick="addQuestion()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Thêm</button>
                </div>
                <div class="space-y-4">
                    ${questions.map((q, i) => `
                        <div class="p-4 bg-white rounded-xl shadow-sm flex justify-between">
                            <span>${i+1}. ${q.text}</span>
                            <button onclick="deleteQuestion(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    `).join('')}
                </div>`;
        }

        window.addQuestion = () => {
            const raw = document.getElementById('rawQuestion').value;
            const parts = raw.split('|');
            if (parts.length >= 6) {
                questions.push({
                    text: parts[0],
                    options: [parts[1], parts[2], parts[3], parts[4]],
                    correct: parts[5]
                });
                localStorage.setItem('gayzota_questions', JSON.stringify(questions));
                renderAdmin();
            } else alert("Nhập sai định dạng rồi Đức ơi!");
        };

        window.deleteQuestion = (i) => {
            questions.splice(i, 1);
            localStorage.setItem('gayzota_questions', JSON.stringify(questions));
            renderAdmin();
        };

        // Chạy lần đầu
        render();
    </script>
</body>
</html>
