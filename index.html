<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA PREMIUM - 8A7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .azota-purple { color: #6d28d9; }
        .bg-azota { background-color: #7c3aed; }
        .btn-admin { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        
        .opt-review { 
            border-radius: 16px; 
            padding: 14px 20px; 
            border: 1.5px solid #e5e7eb; 
            margin-bottom: 10px; 
            font-weight: 600; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .opt-correct { background-color: #dcfce7 !important; border-color: #4ade80 !important; color: #166534 !important; } 
        .opt-wrong { background-color: #fee2e2 !important; border-color: #f87171 !important; color: #991b1b !important; }
        .btn-finish { background-color: #1e293b; color: white; font-weight: 800; border-radius: 20px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav id="navbar" class="hidden bg-white shadow-md p-4 flex justify-between items-center px-8 sticky top-0 z-50">
        <div class="font-black text-2xl azota-purple italic tracking-tighter">GAYZOTA <span class="text-gray-400 text-xs font-normal">v3.0</span></div>
        <div class="flex items-center gap-4">
            <span id="userDisplay" class="text-sm font-bold text-gray-600"></span>
            <button onclick="location.reload()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200">THOÁT</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div id="loginPage" class="glass-card p-10 mt-20 text-center max-w-md mx-auto">
            <h1 class="text-4xl font-black azota-purple mb-8 uppercase italic underline">GAYZOTA</h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-purple-400 transition-all">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-purple-400 transition-all">
                <button onclick="handleLogin()" class="w-full bg-azota text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all">ĐĂNG NHẬP</button>
                <div id="loginError" class="text-red-500 text-xs font-bold hidden">Tài khoản hoặc mật khẩu sai!</div>
            </div>
            <p class="mt-6 text-gray-400 text-xs font-medium italic">Hệ thống thi trắc nghiệm nội bộ 8A7</p>
        </div>

        <div id="mainMenu" class="hidden mt-10 space-y-4">
            <div class="glass-card p-8">
                <h2 class="text-center font-bold text-gray-400 uppercase text-xs tracking-widest mb-6">Bảng Điều Khiển</h2>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="showSection('adminPage')" class="btn-admin p-6 rounded-3xl text-left font-bold shadow-lg flex justify-between items-center group">
                        <div><div class="text-lg">📝 QUẢN LÝ ĐỀ THI</div></div>
                        <span class="text-2xl group-hover:translate-x-2 transition-transform">➔</span>
                    </button>
                    <button onclick="showSection('selectExamPage')" class="bg-white border-2 border-purple-100 p-6 rounded-3xl text-left font-bold text-purple-700 shadow-sm flex justify-between items-center group">
                        <div><div class="text-lg">✍️ VÀO THI NGAY</div></div>
                        <span class="text-2xl group-hover:translate-x-2 transition-transform">➔</span>
                    </button>
                    <button onclick="showSection('resultBoard')" class="bg-white border-2 border-gray-100 p-6 rounded-3xl text-left font-bold text-gray-700 shadow-sm flex justify-between items-center group">
                        <div><div class="text-lg">📊 KẾT QUẢ LỚP</div></div>
                        <span class="text-2xl group-hover:translate-x-2 transition-transform">➔</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="adminPage" class="hidden mt-6 glass-card p-8">
            <button onclick="showSection('mainMenu')" class="text-purple-600 font-bold text-sm mb-4 inline-block italic">← Quay lại Menu</button>
            <input type="text" id="examTitle" placeholder="Tên đề" class="w-full p-4 rounded-xl border-2 mb-4">
            <textarea id="rawInput" class="w-full h-64 p-4 rounded-xl border-2 mb-4 font-mono text-sm" placeholder="Câu 1: 1+1=?&#10;A. 1&#10;B. 2 @t"></textarea>
            <button onclick="saveExamAction()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-md">LƯU ĐỀ</button>
            <div id="adminExamListContent" class="mt-6 space-y-2"></div>
        </div>

        <div id="selectExamPage" class="hidden mt-10">
            <button onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-6 inline-block">← Trở về</button>
            <div id="userExamList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="examPage" class="hidden mt-6 glass-card p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <span id="qNum" class="bg-purple-100 text-purple-700 px-4 py-1 rounded-full font-bold text-sm"></span>
                <div id="timerDisplay" class="text-2xl font-black text-red-500 font-mono tracking-widest">15:00</div>
            </div>
            <div id="qText" class="text-xl font-bold text-gray-800 mb-8"></div>
            <div id="optionsGroup" class="space-y-4"></div>
            <button id="nextBtn" onclick="nextQuestion()" class="hidden mt-10 w-full bg-gray-800 text-white font-bold py-5 rounded-2xl">CÂU TIẾP THEO ➔</button>
        </div>

        <div id="resultPage" class="hidden mt-10 glass-card p-12 text-center max-w-md mx-auto">
            <h2 class="text-2xl font-black text-gray-800 mb-2">Kết quả của bạn</h2>
            <div id="finalScore" class="text-8xl font-black azota-purple my-6">0</div>
            <p id="statCorrect" class="text-gray-700 font-bold text-lg"></p>
            <p id="timeTakenDisplay" class="text-gray-400 text-xs mb-8"></p>
            <hr class="my-6">
            <div id="roastMessage" class="text-2xl font-black italic mb-10 text-gray-700"></div>
            <div class="space-y-3">
                <button onclick="showReview()" class="w-full bg-purple-50 text-purple-700 font-bold py-4 rounded-2xl hover:bg-purple-100">XEM CHI TIẾT ĐÁP ÁN</button>
                <button onclick="showSection('mainMenu')" class="w-full bg-azota text-white font-bold py-4 rounded-2xl">QUAY LẠI MENU</button>
            </div>
        </div>

        <div id="reviewPage" class="hidden mt-10">
            <div class="flex items-center gap-4 mb-6 px-4">
                <div class="w-14 h-14 bg-gray-200 rounded-full border-4 border-white shadow-md overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=8A7" alt="avatar">
                </div>
                <h2 class="text-3xl font-black text-slate-800 italic uppercase">Chi tiết bài làm</h2>
            </div>
            <div id="reviewContent" class="space-y-6"></div>
            <div class="px-4">
                <button onclick="showSection('resultPage')" class="w-full btn-finish py-5 mt-10 uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    HOÀN TẤT
                </button>
            </div>
        </div>

        <div id="resultBoard" class="hidden mt-10 glass-card p-8">
            <button onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-6 inline-block italic">← Trở về</button>
            <h2 class="text-xl font-black mb-6 text-gray-800 uppercase tracking-tighter underline">Bảng vàng 8A7</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b uppercase text-[10px]">
                            <th class="p-3">Học sinh</th>
                            <th class="p-3 text-center">Điểm</th>
                            <th class="p-3 text-right">Ngày giờ / Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const USERS = { 'mrduc': 'admin8a7', 'hoanggay': 'missgay', 'tranhunghuyhoang8a7': 'missgay', 'huynhphamminhduc8a7': 'missgay', 'nguyentrandangkhoa8a7': 'missgay' };
        
        // BỘ ĐỀ 30 CÂU MỚI ĐÃ ĐƯỢC NHẬP TẠI ĐÂY
        let defaultExams = [
            {
                id: Date.now(),
                title: "ÔN TẬP ĐỊA LÝ 8 - ĐẤT VIỆT NAM (30 CÂU)",
                questions: [
                    { q: "Quá trình hình thành đất đặc trưng ở nước ta là", opts: [{t: "feralit.", c: true}, {t: "phù sa.", c: false}, {t: "o-xít.", c: false}, {t: "bồi tụ.", c: false}] },
                    { q: "Ở miền núi, lượng mưa lớn gây ra hiện tượng nào sau đây?", opts: [{t: "Xói mòn, rửa trôi.", c: true}, {t: "Sạt lở, cháy rừng.", c: false}, {t: "Hạn hán, bóc mòn", c: false}, {t: "Xâm thực, bồi tụ.", c: false}] },
                    { q: "Nước ta có mấy nhóm đất chính?", opts: [{t: "3 nhóm.", c: true}, {t: "4 nhóm.", c: false}, {t: "2 nhóm.", c: false}, {t: "5 nhóm.", c: false}] },
                    { q: "Đất mùn núi cao được dùng vào mục đích nào dưới đây?", opts: [{t: "Trồng rừng đầu nguồn.", c: true}, {t: "Trồng cây ăn quả.", c: false}, {t: "Trồng cây công nghiệp.", c: false}, {t: "Trồng rau quả ôn đới.", c: false}] },
                    { q: "Đất nông nghiệp nước ta cải tạo và sử dụng hiệu quả thích hợp trồng loại cây nào dưới đây?", opts: [{t: "Cây lương thực.", c: true}, {t: "Cây hoa màu.", c: false}, {t: "Cây ăn quả.", c: false}, {t: "Cây công nghiệp.", c: false}] },
                    { q: "Đất phù sa cổ phân bố chủ yếu ở khu vực nào dưới đây?", opts: [{t: "Đông Nam Bộ.", c: true}, {t: "Ven sông Tiền.", c: false}, {t: "Vùng ven biển.", c: false}, {t: "Tây Nam Bộ.", c: false}] },
                    { q: "Sự hình thành đất, rất ít chịu tác động của nhân tố nào sau đây?", opts: [{t: "Khoáng sản.", c: true}, {t: "Sinh vật.", c: false}, {t: "Đá mẹ.", c: false}, {t: "Địa hình.", c: false}] },
                    { q: "Ở nước ta, loại đất feralit trên đá vôi phân bố chủ yếu ở khu vực nào sau đây?", opts: [{t: "Tây Bắc.", c: true}, {t: "Đông Nam Bộ.", c: false}, {t: "Tây Nguyên.", c: false}, {t: "Đồng bằng sông Hồng.", c: false}] },
                    { q: "Ở nước ta, đất feralit hình thành trên đá vôi không phổ biến ở khu vực nào sau đây?", opts: [{t: "Tây Nguyên.", c: true}, {t: "Tây Bắc.", c: false}, {t: "Bắc Trung Bộ.", c: false}, {t: "Đông Bắc.", c: false}] },
                    { q: "Đất phù sa ở đồng bằng sông Hồng có đặc điểm nào sau đây?", opts: [{t: "Ít chua, tơi xốp, giàu chất dinh dưỡng.", c: true}, {t: "Đất phù sa ngọt có độ phì cao, tơi xốp.", c: false}, {t: "Đất phèn nghèo dinh dưỡng, đất chặt.", c: false}, {t: "Độ phì thấp, nhiều cát, ít phù sa sông.", c: false}] },
                    { q: "Đất mùn núi cao phân bố rải rác ở các khu vực núi có độ cao từ", opts: [{t: "1600 - 1700m trở lên.", c: true}, {t: "1400 - 1500m trở lên.", c: false}, {t: "1500 - 1600m trở lên.", c: false}, {t: "1700 - 1800m trở lên.", c: false}] },
                    { q: "Nhóm đất feralit chiếm khoảng bao nhiêu % diện tích đất tự nhiên?", opts: [{t: "65%.", c: true}, {t: "24%.", c: false}, {t: "56%.", c: false}, {t: "42%.", c: false}] },
                    { q: "Nhóm đất phù sa chiếm khoảng bao nhiêu % diện tích đất tự nhiên?", opts: [{t: "24%.", c: true}, {t: "65%.", c: false}, {t: "56%.", c: false}, {t: "42%.", c: false}] },
                    { q: "Nhóm đất mùn núi cao chiếm khoảng bao nhiêu % diện tích đất tự nhiên?", opts: [{t: "11%.", c: true}, {t: "23%.", c: false}, {t: "24%.", c: false}, {t: "15%.", c: false}] },
                    { q: "Nhóm đất feralit phân bố chủ yếu ở các khu vực núi có độ cao từ", opts: [{t: "1600 - 1700m trở xuống.", c: true}, {t: "1700 - 1800m trở lên.", c: false}, {t: "Dưới 2000m trở xuống.", c: false}, {t: "1400 - 1500m trở lên.", c: false}] },
                    { q: "Các loại cây công nghiệp lâu năm phù hợp với loại đất nào dưới đây?", opts: [{t: "Feralit.", c: true}, {t: "Phù sa.", c: false}, {t: "Đất mặn.", c: false}, {t: "Đất xám.", c: false}] },
                    { q: "Đất bị rửa trôi, xói mòn chiếm diện tích lớn ở các vùng đồi núi do", opts: [{t: "nạn phá rừng.", c: true}, {t: "lượng mưa lớn.", c: false}, {t: "cháy rừng.", c: false}, {t: "khai khoáng.", c: false}] },
                    { q: "Diện tích đất bị thoái hoá ở Việt Nam khoảng", opts: [{t: "10 triệu ha.", c: true}, {t: "12 triệu ha.", c: false}, {t: "11 triệu ha.", c: false}, {t: "13 triệu ha.", c: false}] },
                    { q: "Ở nước ta, vùng nào sau đây có nguy cơ hoang mạc hóa cao nhất?", opts: [{t: "Duyên hải Nam Trung Bộ.", c: true}, {t: "Đồng bằng sông Hồng.", c: false}, {t: "Trung du và miền núi Bắc Bộ.", c: false}, {t: "Đồng bằng sông Cửu Long.", c: false}] },
                    { q: "Trong nông nghiệp, đất feralit được khai thác và sử dụng chủ yếu để trồng loại cây nào sau đây?", opts: [{t: "Cây công nghiệp.", c: true}, {t: "Cây lương thực.", c: false}, {t: "Cây lúa nước.", c: false}, {t: "Cây hàng năm.", c: false}] },
                    { q: "“Đất bị chua, nghèo dinh dưỡng” là đặc điểm chủ yếu của loại đất nào sau đây?", opts: [{t: "Đất phèn.", c: true}, {t: "Phù sa sông.", c: false}, {t: "Đất mặn.", c: false}, {t: "Đất feralit.", c: false}] },
                    { q: "“Đất chua, nghèo các chất badơ và mùn” là đặc điểm chủ yếu của loại đất nào sau đây?", opts: [{t: "Đất feralit.", c: true}, {t: "Đất badan.", c: false}, {t: "Đất phèn.", c: false}, {t: "Đất mặn.", c: false}] },
                    { q: "Các hợp chất oxit sắt và oxit nhôm thường tích tụ thành kết von là do", opts: [{t: "bị rửa trôi mạnh.", c: true}, {t: "nền nhiệt độ cao.", c: false}, {t: "thảm thực vật ít.", c: false}, {t: "bị phong hóa ít.", c: false}] },
                    { q: "Ở những nơi đất có độ dốc nhỏ có thể trồng kết hợp những cây nào sau đây?", opts: [{t: "Cây công nghiệp hàng năm, cây thực phẩm và cây lương thực.", c: true}, {t: "Cây công nghiệp lâu năm, cây thực phẩm và cây lương thực.", c: false}, {t: "Cây công nghiệp hàng năm, cây ăn quả và cây lương thực.", c: false}, {t: "Cây công nghiệp lâu năm, cây thực phẩm và cây lúa nước.", c: false}] },
                    { q: "Trong nông nghiệp, đất phù sa thích hợp phát triển các loại cây nào sau đây?", opts: [{t: "Cây công nghiệp hàng năm, cây ăn quả.", c: true}, {t: "Cây lúa nước, cây công nghiệp lâu năm.", c: false}, {t: "Cây công nghiệp, ăn quả và cây ôn đới.", c: false}, {t: "Cây lương thực, hoa màu và cây ăn quả.", c: false}] },
                    { q: "Đất phèn có đặc điểm nào sau đây?", opts: [{t: "Đất bị chua, nghèo dinh dưỡng.", c: true}, {t: "Giàu dinh dưỡng, nghèo mùn.", c: false}, {t: "Nhiều cát biển, phù sa tơi xốp.", c: false}, {t: "Có màu nâu, tơi xốp và ít chưa.", c: false}] },
                    { q: "Đất phù sa sông không có đặc điểm nào sau đây?", opts: [{t: "Đất bị chua nhiều.", c: true}, {t: "Ít chưa, tơi xốp.", c: false}, {t: "Giàu dinh dưỡng.", c: false}, {t: "Đất có màu nâu.", c: false}] },
                    { q: "Loại cây nào sau đây ít được trồng ở khu vực có đất phù sa?", opts: [{t: "Cây lâu năm.", c: true}, {t: "Cây hàng năm.", c: false}, {t: "Cây rau đậu.", c: false}, {t: "Cây hoa màu.", c: false}] },
                    { q: "Khu vực nào sau đây không phải nơi thuận lợi để nuôi trồng thủy sản?", opts: [{t: "Bãi biển quanh đảo.", c: true}, {t: "Ở các bãi triều.", c: false}, {t: "Vùng cửa sông.", c: false}, {t: "Khu vực ngập mặn.", c: false}] },
                    { q: "Đất ở khu vực nào sau đây của nước ta dễ nhiễm mặn, nhiễm phèn?", opts: [{t: "Cửa sông, ven biển.", c: true}, {t: "Đồng bằng, đồi núi.", c: false}, {t: "Hải đảo, trung du.", c: false}, {t: "Cao nguyên, các đảo.", c: false}] }
                ]
            }
        ];

        let exams = JSON.parse(localStorage.getItem('myExams')) || defaultExams;
        if (!localStorage.getItem('myExams')) localStorage.setItem('myExams', JSON.stringify(defaultExams));

        let history = JSON.parse(localStorage.getItem('myHistory')) || [];
        let state = { user: '', exam: null, idx: 0, corrects: 0, timer: null, time: 900, startTime: 0, userAnswers: [] };

        function showSection(id) {
            const sections = ['loginPage', 'mainMenu', 'adminPage', 'selectExamPage', 'examPage', 'resultPage', 'resultBoard', 'reviewPage'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'resultBoard') renderResultBoard();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                document.getElementById('userDisplay').innerText = `Chào, ${u.toUpperCase()}`;
                document.getElementById('navbar').classList.remove('hidden');
                showSection('mainMenu');
            } else document.getElementById('loginError').classList.remove('hidden');
        }

        function saveExamAction() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;
            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return { q: lines[0].trim(), opts: lines.slice(1).map(l => ({ t: l.replace('@t','').trim().substring(2).trim(), c: l.includes('@t') })) };
            });
            exams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('myExams', JSON.stringify(exams));
            renderAdminExams();
        }

        function renderAdminExams() {
            document.getElementById('adminExamListContent').innerHTML = exams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-white border rounded-2xl">
                    <span class="font-bold">${ex.title}</span>
                    <button onclick="exams=exams.filter(e=>e.id!=${ex.id});localStorage.setItem('myExams',JSON.stringify(exams));renderAdminExams()" class="text-red-500 font-bold bg-red-50 px-3 py-1 rounded-lg">XÓA</button>
                </div>
            `).join('');
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = exams.map(ex => `
                <button onclick="startExam(${ex.id})" class="p-6 glass-card border-2 border-transparent hover:border-purple-400 text-left">
                    <div class="font-black text-purple-700 text-lg uppercase">${ex.title}</div>
                    <div class="text-xs text-gray-400 mt-1 font-bold italic">${ex.questions.length} CÂU</div>
                </button>
            `).join('');
        }

        function startExam(id) {
            state.exam = exams.find(e => e.id === id);
            state.idx = 0; state.corrects = 0; state.time = 900;
            state.startTime = Date.now();
            state.userAnswers = [];
            showSection('examPage');
            renderQuestion();
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.time <= 0) finishExam();
            }, 1000);
        }

        function renderQuestion() {
            const q = state.exam.questions[state.idx];
            document.getElementById('qNum').innerText = `CÂU ${state.idx + 1} / ${state.exam.questions.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('nextBtn').classList.add('hidden');
            const grp = document.getElementById('optionsGroup'); grp.innerHTML = '';
            
            // Xáo trộn đáp án để không bị lộ A là đúng
            let shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);

            shuffledOpts.forEach((o) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-5 border-2 border-gray-100 rounded-2xl font-bold transition-all";
                b.innerText = o.t;
                b.onclick = () => {
                    if(!document.getElementById('nextBtn').classList.contains('hidden')) return;
                    state.userAnswers.push({ question: q.q, selected: o.t, options: q.opts, isRight: o.c });
                    if(o.c) { b.classList.add('bg-green-500', 'text-white'); state.corrects++; }
                    else b.classList.add('bg-red-500', 'text-white');
                    document.getElementById('nextBtn').classList.remove('hidden');
                };
                grp.appendChild(b);
            });
        }

        function nextQuestion() {
            state.idx++;
            if(state.idx < state.exam.questions.length) renderQuestion();
            else finishExam();
        }

        function finishExam() {
            clearInterval(state.timer);
            const totalQ = state.exam.questions.length;
            const score = Math.round((state.corrects / totalQ) * 10 * 10) / 10;
            const timeDiff = Math.floor((Date.now() - state.startTime) / 1000);
            const now = new Date();
            const formattedDate = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            const formattedTime = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const duration = `${Math.floor(timeDiff/60)}p ${timeDiff%60}s`;

            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('statCorrect').innerText = `Đúng: ${state.corrects}/${totalQ} câu`;
            document.getElementById('timeTakenDisplay').innerText = `Thời gian làm: ${duration}`;

            const roast = document.getElementById('roastMessage');
            if (score === 10) roast.innerText = "cheater😡";
            else if (score > 5) roast.innerText = "chưa tài đâu🤪";
            else roast.innerText = "ăn chi ngu rứa🤓";

            history.unshift({ name: state.user, exam: state.exam.title, score, time: formattedTime, date: formattedDate, duration: duration });
            localStorage.setItem('myHistory', JSON.stringify(history));
        }

        function showReview() {
            showSection('reviewPage');
            const container = document.getElementById('reviewContent');
            container.innerHTML = state.userAnswers.map((ans, i) => {
                let optionsHtml = ans.options.map(opt => {
                    let statusClass = opt.c ? 'opt-correct' : (opt.t === ans.selected ? 'opt-wrong' : '');
                    let badge = opt.c ? '✓ Đáp án đúng' : (opt.t === ans.selected ? '✗ Bạn chọn' : '');
                    return `<div class="opt-review ${statusClass}"><span>${opt.t}</span> <span class="text-[10px] uppercase font-black">${badge}</span></div>`;
                }).join('');
                return `<div class="glass-card p-6 shadow-sm border-t-8 border-purple-500 mx-2"><p class="font-black text-lg mb-4">Câu ${i+1}: ${ans.question}</p><div class="space-y-1">${optionsHtml}</div></div>`;
            }).join('');
        }

        function renderResultBoard() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `
                <tr class="border-b">
                    <td class="p-3"><div class="font-bold uppercase text-xs">${h.name}</div><div class="text-[10px] text-gray-400">${h.exam}</div></td>
                    <td class="p-3 text-center"><div class="font-black text-purple-600 text-lg">${h.score}</div></td>
                    <td class="p-3 text-right text-[9px] font-bold"><div>${h.time} | ${h.date}</div><div class="text-red-400">⏳ ${h.duration}</div></td>
                </tr>
            `).join('') || '<tr><td colspan="3" class="p-4 text-center">Chưa có dữ liệu</td></tr>';
        }
    </script>
</body>
</html>
