<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA v3.0 - 8A7 ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-quiz { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .card-quiz:hover { transform: translateY(-4px); border-color: #3B82F6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .choice-btn { transition: all 0.2s; border: 2px solid #e5e7eb; width: 100%; text-align: left; padding: 1rem; border-radius: 0.75rem; font-weight: 500; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .choice-btn:hover { background-color: #f9fafb; border-color: #d1d5db; }
        .choice-btn.selected { border-color: #3B82F6; background-color: #eff6ff; color: #1e40af; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="app" class="max-w-4xl mx-auto px-4 pt-6">
        <!-- Load Firebase Screen -->
        <div class="flex items-center justify-center min-h-[80vh]">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-gray-600 font-medium">Đang kết nối Firebase...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG FIREBASE CỦA ĐỨC
        const firebaseConfig = {
            apiKey: "AIzaSyCEsThR9wwwVV_28E2-OrpfULGFOA_Ud7g",
            authDomain: "gayzota-8a7.firebaseapp.com",
            databaseURL: "https://gayzota-8a7-default-rtdb.firebaseio.com",
            projectId: "gayzota-8a7",
            storageBucket: "gayzota-8a7.firebasestorage.app",
            messagingSenderId: "782817082757",
            appId: "1:782817082757:web:395c6b73f1d64fc8fd18ec",
            measurementId: "G-MLJJ2N8NSZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- STATE QUẢN LÝ ---
        let currentState = 'login';
        let currentUser = '';
        let questions = JSON.parse(localStorage.getItem('gayzota_questions')) || [];
        let currentAnswers = {};
        let leaderboard = [];

        // Lấy điểm từ Firebase
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            leaderboard = data ? Object.values(data).sort((a, b) => b.score - a.score) : [];
            if(currentState === 'leaderboard') render();
        });

        // --- HÀM RENDER CHÍNH ---
        function render() {
            const container = document.getElementById('app');
            
            if (currentState === 'login') {
                container.innerHTML = `
                    <div class="min-h-[80vh] flex items-center justify-center animate-slide">
                        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border border-white">
                            <div class="text-center mb-8">
                                <h1 class="text-4xl font-extrabold gradient-text mb-2">GAYZOTA v3.0</h1>
                                <p class="text-gray-500 font-medium">Hệ thống thi trực tuyến 8A7</p>
                            </div>
                            <div class="space-y-4">
                                <input type="text" id="nameInput" placeholder="Nhập tên của ông..." class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-blue-400 focus:bg-white outline-none transition-all">
                                <button onclick="window.handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">BẮT ĐẦU THI</button>
                                <button onclick="window.goToAdmin()" class="w-full py-2 text-gray-400 text-xs hover:text-blue-500 transition">Quản trị viên</button>
                            </div>
                        </div>
                    </div>`;
            } 
            else if (currentState === 'quiz') {
                container.innerHTML = `
                    <div class="mb-8 animate-slide flex justify-between items-end">
                        <div>
                            <h2 class="text-2xl font-bold">Thí sinh: ${currentUser}</h2>
                            <p class="text-gray-500">Hoàn thành tất cả câu hỏi để nộp bài</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${questions.length === 0 ? '<p class="text-center py-10">Chưa có câu hỏi nào. Liên hệ Admin Đức nhé!</p>' : 
                        questions.map((q, idx) => `
                            <div class="glass p-8 rounded-3xl shadow-sm border border-white animate-slide">
                                <h3 class="text-lg font-bold mb-4">${idx + 1}. ${q.text}</h3>
                                <div class="space-y-2">
                                    ${q.options.map((opt, i) => `
                                        <button onclick="window.selectOption(${idx}, ${i})" id="q${idx}o${i}" class="choice-btn ${currentAnswers[idx] === i ? 'selected' : ''}">
                                            <span class="w-6 h-6 rounded-full border flex items-center justify-center text-xs">${String.fromCharCode(65+i)}</span>
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${questions.length > 0 ? `<button onclick="window.submitQuiz()" class="mt-8 w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition-all">NỘP BÀI NGAY</button>` : ''}
                `;
            }
            else if (currentState === 'leaderboard') {
                container.innerHTML = `
                    <div class="text-center mb-8">
                        <h1 class="text-3xl font-black gradient-text uppercase">Bảng Vàng 8A7</h1>
                    </div>
                    <div class="glass rounded-3xl shadow-xl overflow-hidden border border-white">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="p-4 font-bold text-gray-400">Hạng</th>
                                    <th class="p-4 font-bold text-gray-400">Tên</th>
                                    <th class="p-4 font-bold text-gray-400">Điểm</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${leaderboard.map((item, idx) => `
                                    <tr class="border-t border-gray-100">
                                        <td class="p-4 font-bold">${idx + 1}</td>
                                        <td class="p-4">${item.name}</td>
                                        <td class="p-4 text-blue-600 font-bold">${item.score}/10</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button onclick="location.reload()" class="w-full mt-6 py-3 bg-gray-200 rounded-xl font-bold">VỀ TRANG CHỦ</button>
                `;
            }
            else if (currentState === 'admin') {
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-2xl font-bold">Quản lý đề thi</h1>
                        <button onclick="location.reload()" class="text-red-500 font-bold text-sm">Thoát</button>
                    </div>
                    <div class="glass p-6 rounded-3xl mb-8 border border-white shadow-lg">
                        <p class="text-sm mb-2 font-bold text-blue-600">Thêm câu hỏi (Định dạng: Câu hỏi|A|B|C|D|Số_Đáp_Án_Đúng)</p>
                        <textarea id="rawInput" class="w-full p-4 bg-gray-50 rounded-xl mb-4 border-none outline-none focus:ring-2 focus:ring-blue-400" rows="3" placeholder="Ví dụ: 1+1 bằng mấy?|2|3|4|5|0"></textarea>
                        <button onclick="window.addQuestion()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Thêm vào đề</button>
                    </div>
                    <div class="space-y-4">
                        ${questions.map((q, i) => `
                            <div class="flex justify-between items-center p-4 bg-white rounded-xl shadow-sm">
                                <span class="truncate pr-4">${i+1}. ${q.text}</span>
                                <button onclick="window.deleteQuestion(${i})" class="text-red-400"><i class="fas fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // --- HÀM XỬ LÝ SỰ KIỆN (GẮN VÀO WINDOW ĐỂ GỌI TỪ HTML) ---
        window.handleLogin = () => {
            const name = document.getElementById('nameInput').value.trim();
            if (name) { currentUser = name; currentState = 'quiz'; render(); }
            else alert("Nhập tên đã ông cháu ơi!");
        };

        window.goToAdmin = () => {
            const pass = prompt("Nhập mã Admin (mặc định: mrduc):");
            if (pass === 'mrduc') { currentState = 'admin'; render(); }
            else alert("Sai pass!");
        };

        window.selectOption = (qIdx, optIdx) => {
            currentAnswers[qIdx] = optIdx;
            render();
        };

        window.submitQuiz = () => {
            if (Object.keys(currentAnswers).length < questions.length) {
                if(!confirm("Chưa làm hết, vẫn muốn nộp à?")) return;
            }
            let correctCount = 0;
            questions.forEach((q, i) => {
                if (currentAnswers[i] === parseInt(q.correct)) correctCount++;
            });
            const score = ((correctCount / questions.length) * 10).toFixed(1);
            
            // Gửi lên Firebase
            push(ref(db, 'leaderboard'), {
                name: currentUser,
                score: parseFloat(score),
                time: new Date().toLocaleTimeString()
            });

            currentState = 'leaderboard';
            render();
        };

        window.addQuestion = () => {
            const val = document.getElementById('rawInput').value;
            const p = val.split('|');
            if (p.length >= 6) {
                questions.push({ text: p[0], options: [p[1], p[2], p[3], p[4]], correct: p[5] });
                localStorage.setItem('gayzota_questions', JSON.stringify(questions));
                document.getElementById('rawInput').value = '';
                render();
            } else alert("Sai định dạng rồi!");
        };

        window.deleteQuestion = (i) => {
            questions.splice(i, 1);
            localStorage.setItem('gayzota_questions', JSON.stringify(questions));
            render();
        };

        // Khởi chạy
        render();

    </script>
</body>
</html>
