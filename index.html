<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* NAVBAR CHUẨN TRONG ẢNH */
        .navbar { background: white; border-bottom: 2px solid #f1f5f9; padding: 15px 40px; display: flex; align-items: center; width: 100%; position: fixed; top: 0; z-index: 50; }
        .logo { font-size: 24px; font-weight: 900; font-style: italic; color: #6d28d9; letter-spacing: -1px; }
        .logo span { font-size: 10px; color: #94a3b8; font-style: normal; margin-left: 4px; }

        /* CONTAINER CHÍNH */
        .main-container { margin-top: 120px; width: 100%; max-width: 700px; padding: 40px; background: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); margin-left: auto; margin-right: auto; }
        .section-title { text-align: center; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }

        /* BUTTON CARD GIỐNG ẢNH */
        .menu-card { display: flex; align-items: center; justify-content: space-between; padding: 25px 35px; border-radius: 35px; margin-bottom: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        
        /* CARD QUẢN LÝ (MÀU CAM) */
        .card-admin { background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; box-shadow: 0 15px 30px rgba(245, 158, 11, 0.3); }
        .card-admin .subtitle { color: rgba(255,255,255,0.7); }
        
        /* CARD TRẮNG (VÀO THI & KẾT QUẢ) */
        .card-white { background: white; border: 2px solid #f8fafc; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card-white:hover { border-color: #f1f5f9; background: #fbfbfb; }

        .title { font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .subtitle { font-size: 11px; font-weight: 500; margin-top: 2px; text-transform: uppercase; }
        .arrow { font-size: 20px; font-weight: bold; }

        input, textarea { border-radius: 20px !important; border: 2px solid #f1f5f9 !important; padding: 15px 20px !important; outline: none; background: #f8fafc; width: 100%; }
        .btn-action { background: #1e293b; color: white; font-weight: 700; padding: 18px; border-radius: 20px; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">GAYZOTA <span>V3.0</span></div>
    </div>

    <!-- 1. LOGIN -->
    <div id="loginPage" class="main-container text-center !max-w-[400px]">
        <h2 class="text-3xl font-black mb-10 text-purple-700 italic uppercase">Đăng nhập</h2>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Tên đăng nhập">
            <input type="password" id="password" placeholder="Mật khẩu">
            <button onclick="handleLogin()" class="btn-action bg-purple-600">Vào hệ thống</button>
        </div>
    </div>

    <!-- 2. MAIN MENU (BẢNG ĐIỀU KHIỂN) -->
    <div id="mainMenu" class="main-container hidden">
        <p class="section-title">Bảng điều khiển</p>
        
        <div id="adminOnlyBtn" onclick="showSection('adminPage')" class="menu-card card-admin hidden">
            <div>
                <div class="title">📄 Quản lý đề thi</div>
                <div class="subtitle">Dành riêng cho MrDuc - Tạo, sửa, xóa đề</div>
            </div>
            <div class="arrow">➔</div>
        </div>

        <div onclick="showSection('selectExamPage')" class="menu-card card-white">
            <div>
                <div class="title text-purple-600">✍️ Vào thi ngay</div>
                <div class="subtitle text-gray-400">Làm bài tập Địa lý, Lịch sử...</div>
            </div>
            <div class="arrow text-purple-600">➔</div>
        </div>

        <div onclick="showSection('resultBoard')" class="menu-card card-white">
            <div>
                <div class="title text-gray-700">📊 Kết quả lớp</div>
                <div class="subtitle text-gray-400">Xem bảng điểm và IP người làm</div>
            </div>
            <div class="arrow text-gray-400">➔</div>
        </div>
    </div>

    <!-- 3. CHỌN ĐỀ -->
    <div id="selectExamPage" class="main-container hidden">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-xs uppercase">← Quay lại</div>
        <div id="userExamList" class="space-y-4 text-center"></div>
    </div>

    <!-- 4. LÀM BÀI -->
    <div id="examView" class="w-full max-w-2xl hidden mt-32 mx-auto">
        <div class="bg-white p-6 rounded-3xl mb-4 flex justify-between items-center shadow-sm">
            <span id="qIdx" class="font-black text-purple-600 uppercase text-xs">CÂU 1</span>
            <div id="timer" class="text-xl font-bold text-red-500 bg-red-50 px-5 py-1 rounded-full">15:00</div>
        </div>
        <div class="bg-white p-10 rounded-[40px] shadow-sm">
            <h3 id="qText" class="text-2xl font-bold mb-10 italic"></h3>
            <div id="optionsArea" class="space-y-3"></div>
        </div>
    </div>

    <!-- 5. ADMIN PAGE -->
    <div id="adminPage" class="main-container hidden">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-xs uppercase">← Quay lại</div>
        <input type="text" id="examTitle" placeholder="Tên đề thi" class="mb-4">
        <textarea id="rawInput" class="h-64 mb-4 font-mono text-sm" placeholder="Câu 1. Nội dung... A. ĐA1 B. ĐA2 @t"></textarea>
        <button onclick="saveExam()" class="btn-action">Lưu vào máy này</button>
        <div id="adminExamList" class="mt-10 space-y-2"></div>
    </div>

    <!-- 6. BẢNG ĐIỂM -->
    <div id="resultBoard" class="main-container hidden">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-xs uppercase">← Quay lại</div>
        <h3 class="font-black mb-6 text-xl uppercase italic underline">Bảng điểm lớp 8A7</h3>
        <table class="w-full text-left"><tbody id="resultTableBody"></tbody></table>
    </div>

    <script>
        const USERS = { 'mrduc': 'admin8a7', '8a7': '8a7' };

        // ==========================================
        // KHU VỰC DÁN ĐỀ CHUNG (MÁY NÀO CŨNG THẤY)
        // ==========================================
        const DATA_CHUNG = [
            {
                id: 1,
                title: "ĐỀ KIỂM TRA MẪU",
                questions: [
                    {
                        qText: "Thủ đô của Việt Nam là gì?",
                        opts: [
                            {text: "Hà Nội", isCorrect: true},
                            {text: "Sài Gòn", isCorrect: false}
                        ]
                    }
                ]
            }
            // Ông dán thêm các cụm đề khác vào đây
        ];

        let localExams = JSON.parse(localStorage.getItem('g_exams')) || [];
        let allExams = [...DATA_CHUNG, ...localExams];
        let history = JSON.parse(localStorage.getItem('g_history')) || [];
        let state = { user: '', currentIdx: 0, corrects: 0, timerInterval: null };

        function showSection(id) {
            document.querySelectorAll('body > div:not(.navbar)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'resultBoard') renderHistory();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                if(u === 'mrduc') document.getElementById('adminOnlyBtn').classList.remove('hidden');
                showSection('mainMenu');
            } else { alert("Sai mật khẩu!"); }
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;
            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return { qText: lines[0].trim(), opts: lines.slice(1).map(l => ({ text: l.replace('@t','').trim().substring(3), isCorrect: l.includes('@t') })) };
            });
            localExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(localExams));
            allExams = [...DATA_CHUNG, ...localExams];
            renderAdmin();
            alert("Đã lưu đề vào máy này!");
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl italic">
                    <span class="font-bold text-gray-500 uppercase text-[10px]">${ex.title}</span>
                </div>
            `).join('');
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="p-5 border-2 border-purple-100 rounded-3xl font-bold text-purple-600 cursor-pointer" onclick="startExam(${ex.id})">${ex.title}</div>
            `).join('');
        }

        function startExam(id) {
            const exam = allExams.find(e => e.id === id);
            state.currentExam = exam; state.currentIdx = 0; state.corrects = 0;
            state.shuffledQs = [...exam.questions].sort(() => Math.random() - 0.5);
            showSection('examView'); loadQuestion(); startTimer(15 * 60);
        }

        function startTimer(sec) {
            clearInterval(state.timerInterval);
            let t = sec;
            state.timerInterval = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (--t < 0) { clearInterval(state.timerInterval); finishExam(); }
            }, 1000);
        }

        function loadQuestion() {
            const q = state.shuffledQs[state.currentIdx];
            document.getElementById('qIdx').innerText = `CÂU ${state.currentIdx + 1} / ${state.shuffledQs.length}`;
            document.getElementById('qText').innerText = q.qText;
            const area = document.getElementById('optionsArea'); area.innerHTML = '';
            q.opts.forEach(opt => {
                const b = document.createElement('div');
                b.className = 'p-5 border-2 border-gray-100 rounded-2xl cursor-pointer font-bold';
                b.innerText = opt.text;
                b.onclick = function() {
                    if(area.style.pointerEvents === 'none') return;
                    area.style.pointerEvents = 'none';
                    this.style.borderColor = opt.isCorrect ? '#22c55e' : '#ef4444';
                    if(opt.isCorrect) state.corrects++;
                    setTimeout(() => {
                        state.currentIdx++; area.style.pointerEvents = 'auto';
                        if(state.currentIdx < state.shuffledQs.length) loadQuestion();
                        else finishExam();
                    }, 500);
                };
                area.appendChild(b);
            });
        }

        function finishExam() {
            clearInterval(state.timerInterval);
            const score = ((state.corrects / state.shuffledQs.length) * 10).toFixed(1);
            history.unshift({ name: state.user.toUpperCase(), score });
            localStorage.setItem('g_history', JSON.stringify(history));
            alert("Điểm: " + score);
            showSection('mainMenu');
        }

        function renderHistory() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `
                <tr class="border-b italic"><td class="py-4 font-bold uppercase text-xs">${h.name}</td><td class="text-right font-black text-purple-600">${h.score}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
