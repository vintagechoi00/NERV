<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA 8A7 | OMNI-SECURITY v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --neon: #00f2ff;
            --deep: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--deep); color: white; 
            overflow-x: hidden; user-select: none;
        }

        /* Hiệu ứng Background động */
        .bg-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            z-index: -1; filter: blur(80px); animation: pulse 8s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } }

        /* Card hiệu ứng Kính Siêu Thực */
        .omni-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-neon {
            background: white; color: black; font-weight: 800;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .btn-neon:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4); background: var(--neon); }

        /* Animation câu hỏi mượt mà */
        .q-entry { animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .opt-item {
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            transition: all 0.3s ease; cursor: pointer;
        }
        .opt-item:hover { background: rgba(255,255,255,0.05); border-color: var(--neon); padding-left: 30px; }
        .opt-item.selected { background: var(--neon) !important; color: black; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>

    <div id="main-wrapper" class="min-h-screen flex flex-col items-center p-6">
        
        <header id="top-nav" class="w-full max-w-5xl flex justify-between items-center py-8 opacity-0 transition-opacity duration-1000">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 border-2 border-white rounded-full flex items-center justify-center font-bold tracking-tighter">8A7</div>
                <h1 class="text-2xl font-bold tracking-widest uppercase italic">Gayzota <span class="font-light opacity-50">Omni</span></h1>
            </div>
            <div id="countdown" class="text-2xl font-mono font-bold text-cyan-400 hidden">15:00</div>
        </header>

        <section id="login-sec" class="w-full max-w-md mt-20 omni-card p-12 text-center">
            <h2 class="text-4xl font-black mb-8 italic tracking-tighter">IDENTITY<br><span class="text-cyan-400">VERIFICATION</span></h2>
            <div class="space-y-6">
                <input type="text" id="u-name" placeholder="Họ tên thí sinh" class="w-full bg-white/5 border-b border-white/20 p-4 outline-none focus:border-cyan-400 transition-all text-center text-xl">
                <input type="text" id="u-class" placeholder="Lớp (8A7)" class="w-full bg-white/5 border-b border-white/20 p-4 outline-none focus:border-cyan-400 transition-all text-center text-xl">
                <button onclick="accessSystem()" class="w-full btn-neon py-5 rounded-2xl uppercase tracking-widest">Khởi tạo dữ liệu</button>
            </div>
        </section>

        <section id="exam-sec" class="hidden w-full max-w-4xl mt-10">
            <div id="q-list" class="space-y-10"></div>
            <button onclick="sealAndSubmit()" class="w-full btn-neon py-8 rounded-[40px] mt-20 text-3xl uppercase italic">Nộp bài & Niêm phong</button>
        </section>

        <section id="result-sec" class="hidden w-full max-w-2xl mt-20 text-center omni-card p-20 border-t-8 border-cyan-400">
            <p class="text-gray-500 uppercase font-bold tracking-[1em] mb-4">Final Score</p>
            <h3 id="res-score" class="text-[180px] font-black leading-none text-white italic drop-shadow-[0_0_30px_rgba(0,242,255,0.5)]">0</h3>
            <p id="res-msg" class="text-2xl font-bold italic text-cyan-400 mb-12"></p>
            <button onclick="location.reload()" class="px-12 py-4 border-2 border-white rounded-full font-bold hover:bg-white hover:text-black transition-all">THOÁT HỆ THỐNG</button>
        </section>

    </div>

    <script>
        // --- CẤU HÌNH SUPABASE ---
        const SB_URL = 'https://fzlbtemrspagisfjvaxs.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bGJ0ZW1yc3BhZ2lzZmp2YXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzUzNjQsImV4cCI6MjA4OTQxMTM2NH0.-LXJQxRZKZOFgQO9NhURTQC3nztcKQ0Ir62kHuup1ek';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let dataStore = { exams: [], active: null, selected: [], cheat: 0 };

        // --- BẢO MẬT NHÂN LOẠI CHƯA TỪNG BIẾT ---
        
        // 1. Chặn toàn bộ phím tắt & Mouse (View Source)
        window.addEventListener('keydown', e => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault(); alert("HỆ THỐNG ĐÃ KHÓA!");
            }
        });

        // 2. Anti-DevTools (Tự hủy nếu mở Console)
        let devtools = function() {};
        devtools.toString = function() {
            document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>PHÁT HIỆN GIAN LẬN! DỮ LIỆU ĐÃ BỊ HỦY.</h1>";
            return '';
        }
        console.log('%c', devtools);

        // 3. Chặn Inspect bằng cách check kích thước cửa sổ
        window.onresize = function() {
            if ((window.outerHeight - window.innerHeight) > 200 || (window.outerWidth - window.innerWidth) > 200) {
                document.body.style.display = 'none';
                location.reload();
            }
        };

        // --- LOGIC HỆ THỐNG ---

        async function accessSystem() {
            const n = document.getElementById('u-name').value;
            const c = document.getElementById('u-class').value;
            if(!n || !c) return alert("Nhập tên b êi!");

            dataStore.u = n; dataStore.c = c;
            document.getElementById('top-nav').style.opacity = '1';
            
            const { data } = await client.from('exams').select('*');
            dataStore.exams = data || [];
            
            // Vào thẳng đề đầu tiên cho máu
            if(dataStore.exams.length > 0) start(dataStore.exams[0].id);
        }

        function start(id) {
            dataStore.active = dataStore.exams.find(e => e.id === id);
            dataStore.selected = new Array(dataStore.active.questions.length).fill(null);
            document.getElementById('login-sec').classList.add('hidden');
            document.getElementById('exam-sec').classList.remove('hidden');
            document.getElementById('countdown').classList.remove('hidden');
            render();
        }

        function render() {
            const container = document.getElementById('q-list');
            container.innerHTML = dataStore.active.questions.map((q, i) => `
                <div class="omni-card p-10 q-entry" style="animation-delay: ${i*0.1}s">
                    <p class="text-xs font-bold text-cyan-400 mb-4 tracking-widest">PHÂN ĐOẠN ${i+1}</p>
                    <h3 class="text-3xl font-bold mb-10">${q.q}</h3>
                    <div class="space-y-4">
                        ${q.opts.map((o, oi) => `
                            <div onclick="pick(${i}, ${oi})" id="q-${i}-${oi}" class="opt-item p-6 text-xl">
                                ${o.t}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function pick(qI, oI) {
            dataStore.selected[qI] = dataStore.active.questions[qI].opts[oI];
            document.querySelectorAll(`.q-entry:nth-child(${qI+1}) .opt-item`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`q-${qI}-${oI}`).classList.add('selected');
        }

        async function sealAndSubmit() {
            const corrects = dataStore.selected.filter(s => s?.c).length;
            const finalScore = Math.round((corrects / dataStore.active.questions.length) * 10 * 10) / 10;

            document.getElementById('exam-sec').classList.add('hidden');
            document.getElementById('countdown').classList.add('hidden');
            document.getElementById('result-sec').classList.remove('hidden');
            
            // Effect chạy số điểm
            let start = 0;
            const interval = setInterval(() => {
                if(start >= finalScore) {
                    clearInterval(interval);
                    document.getElementById('res-score').innerText = finalScore;
                } else {
                    start += 0.1;
                    document.getElementById('res-score').innerText = start.toFixed(1);
                }
            }, 20);

            const msg = document.getElementById('res-msg');
            if(finalScore === 10) msg.innerText = "HACKER PHÁT HIỆN 💀";
            else if(finalScore >= 8) msg.innerText = "ĐẲNG CẤP OMNI 🔥";
            else msg.innerText = "CHƯA ĐỦ TRÌNH ĐỘ 🤡";

            // Gửi dữ liệu với bảo mật Header DUCDAY_99
            await client.from('leaderboard').insert([{ 
                username: `${dataStore.u} (${dataStore.c})`, 
                score: finalScore 
            }], {
                headers: { 'x-my-pass': 'DUCDAY_99' } 
            });
        }
    </script>
</body>
</html>
