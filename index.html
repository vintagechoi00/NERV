<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA PREMIUM - 8A7 EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --color-primary-start: #2563eb;
            --color-primary-end: #7c3aed;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: #f0f4f8; color: #1e293b; overflow-x: hidden; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .text-gradient { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-gradient { background: var(--gradient-primary); color: white; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }

        .opt-btn {
            width: 100%; text-align: left; padding: 12px 20px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-weight: 600; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 10px; background: white;
            margin-bottom: 8px;
        }
        .opt-btn:hover { border-color: #7c3aed; background-color: #f5f3ff; }
        .opt-btn.selected { border: 2px solid #7c3aed !important; background-color: #f8f7ff !important; }

        .opt-label {
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 2px solid #cbd5e1; font-weight: 800; font-size: 13px; color: #64748b;
        }
        .selected .opt-label { border-color: #7c3aed; color: #7c3aed; background: white; }

        .q-circle {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.2s ease; background: white; color: #64748b;
        }
        .q-circle.answered { background: var(--gradient-primary); color: white; border-color: transparent; }

        .opt-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .opt-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        
        .question-block { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px dashed #e2e8f0; }

        /* Custom Modal Styles */
        #customModal { transition: all 0.3s ease; }
        .modal-box { width: 350px; border-radius: 24px; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .modal-content { padding: 30px 20px; text-align: center; background: white; font-weight: 600; color: #1e293b; }
        .modal-footer { display: flex; border-top: 1px solid #eee; }
        .modal-btn { flex: 1; padding: 15px; font-weight: 700; transition: all 0.2s; background: white; }
        .modal-btn:hover { background: #f8fafc; }
        .modal-btn-primary { border-left: 1px solid #eee; color: #7c3aed; }
        .modal-btn-secondary { color: #64748b; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Custom Modal -->
    <div id="customModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm hidden">
        <div class="modal-box glass-card bg-white shadow-2xl scale-95 transition-transform duration-300">
            <div id="modalText" class="modal-content"></div>
            <div class="modal-footer">
                <button id="modalCancel" class="modal-btn modal-btn-secondary uppercase text-xs tracking-widest">Hủy bỏ</button>
                <button id="modalConfirm" class="modal-btn modal-btn-primary uppercase text-xs tracking-widest">Tiếp tục</button>
            </div>
        </div>
    </div>

    <nav id="navbar" class="hidden sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg" style="background: var(--gradient-primary);">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-inner font-black text-violet-600">A</div>
            <span class="font-extrabold text-2xl tracking-tighter text-white">GAYZOTA <span class="font-light opacity-80">8A7</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="userDisplay" class="hidden md:block text-sm font-bold text-white bg-white/20 px-4 py-2 rounded-full"></span>
            <button onclick="location.reload()" class="text-white/80 hover:text-white p-2">Thoát</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- Login Page -->
        <div id="loginPage" class="mt-24 max-w-md mx-auto glass-card p-10">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black tracking-tighter uppercase italic text-gradient">GAYZOTA <span class="text-gray-300 font-light">v3.0</span></h1>
                <p class="text-gray-500 text-sm mt-3 font-semibold">Nhập thông tin để vào thi</p>
            </div>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Họ và tên" class="w-full p-4 rounded-2xl border border-gray-200 outline-none focus:ring-2 focus:ring-violet-300">
                <input type="text" id="userClass" placeholder="Lớp (VD: 8A7)" class="w-full p-4 rounded-2xl border border-gray-200 outline-none focus:ring-2 focus:ring-violet-300">
                <button onclick="handleFastLogin()" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl text-lg mt-2">VÀO MENU</button>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="hidden mt-10 space-y-8">
            <div class="glass-card p-10 text-center text-white relative overflow-hidden" style="background: var(--gradient-primary);">
                <h2 class="text-3xl font-extrabold relative z-10">Xin chào, <span id="welcomeUser" class="italic">Thành viên 8A7</span>! 👋</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="showSection('selectExamPage')" class="glass-card p-8 flex flex-col items-center group active:scale-95">
                    <div class="w-20 h-20 bg-violet-100 rounded-3xl flex items-center justify-center text-4xl mb-5">✍️</div>
                    <span class="font-bold text-xl text-slate-800">Vào thi ngay</span>
                </button>
                <button onclick="showSection('resultBoard')" class="glass-card p-8 flex flex-col items-center group active:scale-95">
                    <div class="w-20 h-20 bg-blue-100 rounded-3xl flex items-center justify-center text-4xl mb-5">🏆</div>
                    <span class="font-bold text-xl text-slate-800">Bảng vàng</span>
                </button>
                <button id="adminBtn" onclick="showSection('adminPage')" class="hidden glass-card p-8 flex flex-col items-center group active:scale-95">
                    <div class="w-20 h-20 bg-gray-100 rounded-3xl flex items-center justify-center text-4xl mb-5">⚙️</div>
                    <span class="font-bold text-xl text-slate-800">Quản lý đề</span>
                </button>
            </div>
        </div>

        <!-- Section Select Exam -->
        <div id="selectExamPage" class="hidden mt-6">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="showSection('mainMenu')" class="text-gray-500 font-semibold flex items-center gap-1">← Quay lại</button>
                <h2 class="text-3xl font-black text-gradient uppercase">Đề thi hiện có</h2>
            </div>
            <div id="userExamList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Exam Page -->
        <div id="examPage" class="hidden mt-4">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3">
                    <div id="questionsContainer" class="glass-card p-8 md:p-12 min-h-[550px] relative"></div>
                </div>
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass-card p-8 text-center border-t-4 border-violet-500 sticky top-24">
                        <div id="timerDisplay" class="text-5xl font-black text-gradient tabular-nums mb-2">15:00</div>
                        <button onclick="finishExam()" class="w-full py-4 bg-red-500 text-white rounded-2xl font-extrabold text-xl shadow-lg mt-6 active:scale-95">NỘP BÀI</button>
                    </div>
                    <div class="glass-card p-6 sticky top-[340px]">
                        <h3 class="text-sm font-bold text-slate-500 uppercase mb-5">Phiếu bài làm <span id="progressText" class="float-right text-violet-600">0/0</span></h3>
                        <div id="questionMap" class="flex flex-wrap gap-2.5"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Page -->
        <div id="resultPage" class="hidden mt-10 max-w-2xl mx-auto text-center">
            <div class="glass-card p-16 border-4 border-violet-100">
                <h2 class="text-2xl font-bold text-gray-400 uppercase tracking-widest">KẾT QUẢ CỦA BẠN</h2>
                <div id="finalScore" class="text-[150px] font-black text-gradient leading-none my-8">0</div>
                <div class="flex gap-4 justify-center mb-12">
                    <p id="statCorrect" class="text-xl font-bold text-slate-700 bg-gray-100 px-6 py-2 rounded-full"></p>
                </div>
                <div id="roastMessage" class="text-2xl font-black italic mb-12 text-slate-800"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="showReview()" class="bg-violet-50 text-violet-700 font-bold py-4 rounded-2xl">Xem đáp án</button>
                    <button onclick="showSection('mainMenu')" class="bg-slate-800 text-white font-bold py-4 rounded-2xl">Về trang chủ</button>
                </div>
            </div>
        </div>

        <!-- Review Page -->
        <div id="reviewPage" class="hidden mt-6">
            <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-2xl">
                <h2 class="text-3xl font-black text-gradient italic uppercase">Chi tiết bài làm</h2>
                <button onclick="showSection('resultPage')" class="btn-gradient px-8 py-3 rounded-xl font-bold">Quay lại</button>
            </div>
            <div id="reviewContent" class="space-y-6"></div>
        </div>

        <!-- Admin Page -->
        <div id="adminPage" class="hidden mt-6 glass-card p-10 max-w-4xl mx-auto">
            <button onclick="showSection('mainMenu')" class="text-gray-500 font-semibold mb-6">← Quay lại Menu</button>
            <h2 class="text-3xl font-black mb-8 text-slate-800">QUẢN LÝ ĐỀ THI</h2>
            <div class="space-y-5">
                <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full p-4 rounded-xl border">
                <textarea id="rawInput" class="w-full h-80 p-5 rounded-xl border font-mono text-sm" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án 1 @t&#10;B. Đáp án 2"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleSaveExam()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">LƯU LÊN MÂY</button>
                    <button onclick="confirmReset()" class="w-full bg-red-100 text-red-600 font-bold py-4 rounded-xl">XÓA TRẮNG NHẬP LIỆU</button>
                </div>
            </div>
            <div id="adminExamListContent" class="mt-12 space-y-4"></div>
        </div>

        <!-- Leaderboard -->
        <div id="resultBoard" class="hidden mt-10 glass-card p-10 max-w-5xl mx-auto">
            <button onclick="showSection('mainMenu')" class="text-gray-500 font-semibold mb-6">← Quay lại Menu</button>
            <h2 class="text-4xl font-black text-gradient uppercase mb-10 text-center">BẢNG VÀNG 8A7</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 text-xs uppercase border-b pb-4">
                            <th>Hạng</th><th>Thành viên</th><th class="text-center">Điểm</th><th class="text-right">Ngày thi</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://owfudlqolibgipsbtejm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZnVkbHFvbGliZ2lwc2J0ZWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTU2NzMsImV4cCI6MjA4ODYzMTY3M30.3gBJy-umboXye70MKe7rqTOtseW0Ay1kBfBI_FPrZoE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_NAMES = ['mrduc', 'hoanggay', 'kimngocngu'];
        let exams = [], state = { user: '', userClass: '', exam: null, timer: null, time: 900, userAnswers: [], startTime: null };

        // --- CUSTOM MODAL ENGINE ---
        function openModal(text, onConfirm) {
            const modal = document.getElementById('customModal');
            const modalBox = modal.querySelector('.modal-box');
            document.getElementById('modalText').innerText = text;
            modal.classList.remove('hidden');
            setTimeout(() => modalBox.classList.remove('scale-95'), 10);

            document.getElementById('modalConfirm').onclick = () => {
                modal.classList.add('hidden');
                modalBox.classList.add('scale-95');
                onConfirm();
            };
            document.getElementById('modalCancel').onclick = () => {
                modal.classList.add('hidden');
                modalBox.classList.add('scale-95');
            };
        }

        async function syncDB() {
            const { data: ex } = await _supabase.from('exams').select('*').order('id', { ascending: false });
            if(ex) exams = ex;
        }

        async function handleFastLogin() {
            const name = document.getElementById('username').value.trim();
            const uClass = document.getElementById('userClass').value.trim();
            if(!name || !uClass) return;
            state.user = name;
            state.userClass = uClass;
            document.getElementById('userDisplay').innerText = `${name.toUpperCase()} - ${uClass}`;
            document.getElementById('welcomeUser').innerText = name.toUpperCase();
            document.getElementById('navbar').classList.remove('hidden');
            if(ADMIN_NAMES.includes(name.toLowerCase())) document.getElementById('adminBtn').classList.remove('hidden');
            await syncDB();
            showSection('mainMenu');
        }

        function showSection(id) {
            document.querySelectorAll('body > div > div').forEach(s => { if(s.id !== 'navbar') s.classList.add('hidden'); });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'resultBoard') renderResultBoard();
            window.scrollTo(0,0);
        }

        async function deleteExam(id, title) {
            openModal(`Bạn có chắc muốn XÓA đề: "${title}" không?`, async () => {
                await _supabase.from('exams').delete().eq('id', id);
                await syncDB();
                renderAdminExams();
            });
        }

        function confirmReset() {
            openModal("Bạn có muốn xóa trắng nội dung đang nhập không?", () => {
                document.getElementById('examTitle').value = '';
                document.getElementById('rawInput').value = '';
            });
        }

        async function handleSaveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;
            openModal("Bạn có muốn TẠO đề thi này không?", async () => {
                const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
                const questions = blocks.map(b => {
                    const lines = b.trim().split('\n');
                    return { q: lines[0].trim(), opts: lines.slice(1).map(l => ({ t: l.replace('@t','').substring(2).trim(), c: l.includes('@t') })) };
                });
                await _supabase.from('exams').insert([{ title, questions }]);
                document.getElementById('examTitle').value = ''; 
                document.getElementById('rawInput').value = '';
                await syncDB(); 
                renderAdminExams();
            });
        }

        function renderAdminExams() {
            document.getElementById('adminExamListContent').innerHTML = exams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-white border rounded-xl hover:border-violet-300 transition-all cursor-pointer group" onclick="editExam(${ex.id})">
                    <span class="font-bold group-hover:text-violet-600 transition-colors">📝 ${ex.title}</span>
                    <button onclick="event.stopPropagation(); deleteExam(${ex.id}, '${ex.title}')" class="text-red-400 hover:text-red-600 font-bold px-3 py-1">XÓA</button>
                </div>`).join('');
        }

        function editExam(id) {
            const ex = exams.find(e => e.id === id);
            if(!ex) return;
            document.getElementById('examTitle').value = ex.title;
            let raw = ex.questions.map((q, i) => {
                let opts = q.opts.map((o, j) => `${String.fromCharCode(65+j)}. ${o.t}${o.c ? ' @t' : ''}`).join('\n');
                return `Câu ${i+1}: ${q.q}\n${opts}`;
            }).join('\n\n');
            document.getElementById('rawInput').value = raw;
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = exams.map(ex => `
                <button onclick="startExam(${ex.id})" class="glass-card p-8 text-left group active:scale-95 transition-all">
                    <div class="font-extrabold text-xl uppercase mb-4 group-hover:text-violet-600 transition-colors">${ex.title}</div>
                    <div class="text-xs font-bold text-gray-400 uppercase">${ex.questions?.length || 0} Câu | 15 Phút</div>
                </button>`).join('');
        }

        function startExam(id) {
            state.exam = exams.find(e => e.id === id);
            state.time = 900; 
            state.startTime = new Date();
            state.userAnswers = new Array(state.exam.questions.length).fill(null);
            showSection('examPage');
            renderAllQuestions();
            startTimer();
        }

        function startTimer() {
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.time <= 0) finishExam();
            }, 1000);
        }

        function renderAllQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            state.exam.questions.forEach((q, qIdx) => {
                const qBlock = document.createElement('div');
                qBlock.id = `q-block-${qIdx}`; qBlock.className = 'question-block';
                const labels = ['A', 'B', 'C', 'D'];
                let optionsHtml = q.opts.map((o, i) => `
                    <button onclick="selectOption(${qIdx}, ${i})" class="opt-btn ${state.userAnswers[qIdx]?.selected === o.t ? 'selected' : ''}">
                        <div class="opt-label">${labels[i]}</div><div class="flex-1">${o.t}</div>
                    </button>`).join('');
                qBlock.innerHTML = `<div class="flex items-center gap-3 mb-6"><span class="btn-gradient text-white px-4 py-1.5 rounded-lg font-bold text-xs">Câu ${qIdx + 1}</span></div>
                    <div class="text-xl font-semibold text-slate-800 mb-6">${q.q}</div><div class="space-y-2">${optionsHtml}</div>`;
                container.appendChild(qBlock);
            });
            renderMap();
        }

        function selectOption(qIdx, optIdx) {
            const q = state.exam.questions[qIdx]; const o = q.opts[optIdx];
            state.userAnswers[qIdx] = { question: q.q, selected: o.t, options: q.opts, isRight: o.c };
            const buttons = document.querySelectorAll(`#q-block-${qIdx} .opt-btn`);
            buttons.forEach((btn, i) => i === optIdx ? btn.classList.add('selected') : btn.classList.remove('selected'));
            renderMap();
        }

        function renderMap() {
            document.getElementById('questionMap').innerHTML = state.exam.questions.map((_, i) => 
                `<div onclick="scrollToQuestion(${i})" class="q-circle ${state.userAnswers[i]?'answered':''}">${i+1}</div>`).join('');
            document.getElementById('progressText').innerText = `${state.userAnswers.filter(a=>a).length}/${state.exam.questions.length}`;
        }

        function scrollToQuestion(i) {
            const el = document.getElementById(`q-block-${i}`);
            window.scrollTo({ top: el.getBoundingClientRect().top - document.body.getBoundingClientRect().top - 100, behavior: 'smooth' });
        }

        async function finishExam() {
            clearInterval(state.timer);
            const totalQ = state.exam.questions.length;
            const corrects = state.userAnswers.filter(a => a?.isRight).length;
            const score = Math.round((corrects / totalQ) * 10 * 10) / 10;
            const now = new Date();
            const timeUsed = Math.floor((now.getTime() - state.startTime.getTime()) / 1000);
            const mUsed = Math.floor(timeUsed/60), sUsed = timeUsed%60;

            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('statCorrect').innerText = `Đúng: ${corrects}/${totalQ} câu`;
            const roast = document.getElementById('roastMessage');
            if (score === 10) roast.innerText = "CHEATER😡";
            else if (score >= 5) roast.innerText = "CHƯA TÀI ĐÂU😛";
            else roast.innerText = "ĂN CHI NGU RỨA🤓";

            await _supabase.from('history').insert([{ 
                name: `${state.user} (${state.userClass})`, 
                exam: state.exam.title, 
                score, 
                date: `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`,
                timestamp: now.getTime(),
                extra_info: `Dùng: ${mUsed}p ${sUsed}s`
            }]);
        }

        function showReview() {
            showSection('reviewPage');
            document.getElementById('reviewContent').innerHTML = state.userAnswers.map((ans, i) => {
                if(!ans) return `<div class="glass-card p-6 bg-red-50">Câu ${i+1}: Không trả lời</div>`;
                return `<div class="glass-card p-8"><p class="font-bold text-xl mb-6">Câu ${i+1}: ${ans.question}</p>
                    ${ans.options.map(opt => `<div class="p-4 border-2 rounded-xl mb-3 ${opt.c?'opt-correct':(opt.t===ans.selected?'opt-wrong':'')}">${opt.t}</div>`).join('')}
                </div>`;
            }).join('');
        }

        async function renderResultBoard() {
            const { data } = await _supabase.from('history').select('*').order('score', { ascending: false });
            const tbody = document.getElementById('resultTableBody');
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 font-bold text-gray-400">Chưa có ai thi đề này...</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((h, i) => `
                <tr class="border-b h-20 hover:bg-gray-50 cursor-pointer" onclick="openModal('Chi tiết thi của ${h.name}: Điểm ${h.score}, ${h.extra_info}', ()=>{})">
                    <td class="font-black text-xl pl-2 ${i<3?'text-gradient':''}">${i+1}</td>
                    <td class="font-bold uppercase text-sm">${h.name}<br><span class="text-[10px] text-gray-400">${h.exam}</span></td>
                    <td class="text-center font-black text-2xl text-gradient">${h.score}</td>
                    <td class="text-right text-[10px] text-gray-500 pr-2">${h.date}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
