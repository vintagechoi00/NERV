<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA - 8A7 EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; color: #334155; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .azota-purple { color: #8b5cf6; }
        .link-style { color: #8b5cf6; font-weight: bold; text-decoration: underline; cursor: pointer; transition: 0.2s; }
        .link-style:hover { color: #6d28d9; opacity: 0.8; }
        input, textarea { border-radius: 15px !important; border: 1.5px solid #e2e8f0 !important; padding: 12px 18px !important; outline: none; }
        .opt-btn { border: 2px solid #f1f5f9; width: 100%; text-align: left; padding: 16px; border-radius: 18px; font-weight: 600; margin-bottom: 12px; cursor: pointer; }
        
        /* THÔNG BÁO CHỮ XANH LÁ TỐI GIẢN */
        #toast {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;
            padding: 10px 25px; border-radius: 50px; font-size: 14px; font-weight: bold;
            z-index: 9999; transition: all 0.4s ease; opacity: 0;
        }
        #toast.active { bottom: 30px; opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Toast Notification -->
    <div id="toast">Đã tạo đề thành công!</div>

    <!-- NAVBAR -->
    <nav id="navbar" class="hidden w-full max-w-2xl flex justify-between items-center py-6 mb-4 border-b border-dashed border-gray-200">
        <div class="font-black azota-purple italic uppercase text-xl">GAYZOTA</div>
        <button onclick="location.reload()" class="text-[10px] font-black text-red-400 uppercase border border-red-100 px-2 py-1 rounded-lg">Thoát</button>
    </nav>

    <!-- 1. ĐĂNG NHẬP -->
    <div id="loginPage" class="glass-card p-10 w-full max-w-sm mt-20 text-center">
        <h2 class="text-3xl font-black mb-10 azota-purple uppercase italic underline decoration-wavy">GAYZOTA</h2>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full">
            <button onclick="handleLogin()" class="w-full bg-[#8b5cf6] text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-4">ĐĂNG NHẬP</button>
        </div>
    </div>

    <!-- 2. MENU CHÍNH -->
    <div id="mainMenu" class="glass-card p-12 w-full max-w-lg hidden mt-10">
        <div class="flex flex-col items-center space-y-8">
            <div onclick="showSection('adminPage')" class="link-style text-lg text-orange-500 uppercase">📝 Quản lý đề thi (Admin)</div>
            <div onclick="showSection('selectExamPage')" class="link-style text-xl uppercase">✍️ Vào thi ngay (Xáo đề)</div>
            <div onclick="showSection('resultBoard')" class="link-style text-lg text-gray-500 uppercase">📊 Kết quả lớp 8A7</div>
        </div>
    </div>

    <!-- 3. QUẢN LÝ ĐỀ -->
    <div id="adminPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
        <div onclick="showSection('mainMenu')" class="text-[10px] font-black text-gray-400 mb-8 cursor-pointer uppercase tracking-widest">← Quay lại</div>
        <h3 class="font-black mb-6 azota-purple italic underline uppercase">Tạo đề thi mới</h3>
        <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full mb-4">
        <textarea id="rawInput" class="w-full h-64 mb-4 font-mono text-sm" placeholder="Câu 1: Câu hỏi...&#10;A. Đáp án 1&#10;B. Đáp án đúng @t"></textarea>
        <button onclick="saveExam()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl mb-8 uppercase text-xs">Lưu đề ngay</button>
        <div id="adminExamList" class="space-y-3"></div>
    </div>

    <!-- 4. CHỌN ĐỀ THI -->
    <div id="selectExamPage" class="glass-card p-10 w-full max-w-lg hidden mt-4 text-center">
        <div onclick="showSection('mainMenu')" class="text-[10px] font-black text-gray-400 mb-8 cursor-pointer uppercase tracking-widest">← Quay lại</div>
        <div id="userExamList" class="flex flex-col space-y-6"></div>
    </div>

    <!-- 5. GIAO DIỆN LÀM BÀI -->
    <div id="examView" class="w-full max-w-2xl hidden mt-4">
        <div class="glass-card p-8 mb-4 flex justify-between items-center">
            <span id="qIdx" class="font-black text-purple-600 uppercase text-xs tracking-widest">Câu 1/10</span>
            <div id="timer" class="text-xl font-mono font-bold text-red-500 bg-red-50 px-4 py-1 rounded-full">15:00</div>
        </div>
        <div class="glass-card p-8">
            <h3 id="qText" class="text-xl font-bold mb-8 leading-relaxed"></h3>
            <div id="optionsArea"></div>
        </div>
    </div>

    <!-- 6. KẾT QUẢ -->
    <div id="resultView" class="glass-card p-12 w-full max-w-sm hidden mt-20 text-center">
        <div id="finalScore" class="text-7xl font-black azota-purple mb-6">0.0</div>
        <div onclick="showSection('mainMenu')" class="link-style uppercase">Xong</div>
    </div>

    <!-- 7. BẢNG ĐIỂM -->
    <div id="resultBoard" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
        <div onclick="showSection('mainMenu')" class="text-[10px] font-black text-gray-400 mb-8 cursor-pointer uppercase tracking-widest">← Quay lại</div>
        <table class="w-full text-left text-sm"><tbody id="resultTableBody"></tbody></table>
    </div>

    <script>
        const USERS = { 'mrduc': 'admin8a7' };
        let allExams = JSON.parse(localStorage.getItem('g_exams')) || [];
        let history = JSON.parse(localStorage.getItem('g_history')) || [];
        let state = { user: '', currentExam: null, shuffledQs: [], currentIdx: 0, corrects: 0, timerInterval: null };

        // Hàm hiện thông báo trượt lên thay cho Alert (Màu xanh lá)
        function notify(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            if(isError) {
                t.style.background = "#fef2f2";
                t.style.color = "#ef4444";
                t.style.borderColor = "#fecaca";
            } else {
                t.style.background = "#f0fdf4";
                t.style.color = "#16a34a";
                t.style.borderColor = "#bbf7d0";
            }
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showSection(id) {
            document.querySelectorAll('body > div:not(#toast)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'resultBoard') renderHistory();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                showSection('mainMenu');
                notify("Chào mừng trở lại!");
            } else { notify("Sai mật khẩu rồi!", true); }
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return notify("Nhập thiếu thông tin rồi!", true);

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return {
                    qText: lines[0].trim(),
                    opts: lines.slice(1).map(l => ({
                        text: l.replace('@t', '').trim().substring(2).trim(),
                        isCorrect: l.includes('@t')
                    }))
                };
            });

            allExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            notify("Đã tạo đề thành công!"); // Chỗ này sẽ hiện màu xanh lá
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl text-sm">
                    <span class="font-bold text-gray-600">${ex.title}</span>
                    <button onclick="deleteExam(${ex.id})" class="text-red-400 font-black text-[10px]">XÓA</button>
                </div>
            `).join('');
        }

        function deleteExam(id) {
            allExams = allExams.filter(e => e.id !== id);
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            notify("Đã xóa đề!");
            renderAdmin();
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="link-style text-lg uppercase" onclick="startExam(${ex.id})">${ex.title}</div>
            `).join('') || 'Chưa có đề';
        }

        function startExam(id) {
            const exam = allExams.find(e => e.id === id);
            state.currentExam = exam;
            state.currentIdx = 0;
            state.corrects = 0;
            state.shuffledQs = shuffle(exam.questions);
            showSection('examView');
            loadQuestion();
            notify("Bắt đầu làm bài. Cố lên!");
        }

        function loadQuestion() {
            const q = state.shuffledQs[state.currentIdx];
            document.getElementById('qIdx').innerText = `Câu ${state.currentIdx + 1} / ${state.shuffledQs.length}`;
            document.getElementById('qText').innerText = q.qText;
            const area = document.getElementById('optionsArea');
            area.innerHTML = '';
            
            shuffle(q.opts).forEach(opt => {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                b.innerText = opt.text;
                b.onclick = function() {
                    if(this.parentElement.style.pointerEvents === 'none') return;
                    this.parentElement.style.pointerEvents = 'none';
                    if(opt.isCorrect) { this.style.borderColor = '#22c55e'; state.corrects++; }
                    else { this.style.borderColor = '#ef4444'; }
                    
                    setTimeout(() => {
                        state.currentIdx++;
                        area.style.pointerEvents = 'auto';
                        if(state.currentIdx < state.shuffledQs.length) loadQuestion();
                        else finishExam();
                    }, 400);
                };
                area.appendChild(b);
            });
        }

        function finishExam() {
            const score = ((state.corrects / state.shuffledQs.length) * 10).toFixed(1);
            history.unshift({ name: state.user, title: state.currentExam.title, score, time: new Date().toLocaleTimeString() });
            localStorage.setItem('g_history', JSON.stringify(history));
            document.getElementById('finalScore').innerText = score;
            showSection('resultView');
            notify("Đã hoàn thành bài thi!");
        }

        function renderHistory() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `
                <tr class="border-b border-gray-50">
                    <td class="py-4 font-bold text-gray-700 uppercase text-[10px]">${h.name}</td>
                    <td class="py-4 text-center font-black text-purple-600">${h.score}đ</td>
                </tr>
            `).join('') || 'Chưa có ai thi';
        }
    </script>
</body>
</html>
