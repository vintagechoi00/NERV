<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA PREMIUM - 8A7 EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --color-primary-start: #2563eb;
            --color-primary-end: #7c3aed;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: #f0f4f8; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
        .text-gradient { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-gradient { background: var(--gradient-primary); color: white; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .opt-btn { width: 100%; text-align: left; padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 12px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; background: white; margin-bottom: 8px; }
        .opt-btn:hover { border-color: var(--color-primary-end); background-color: #f5f3ff; }
        .opt-btn.selected { border-color: transparent; background-image: linear-gradient(white, white), var(--gradient-primary); background-origin: border-box; background-clip: content-box, border-box; }
        .opt-label { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #cbd5e1; font-weight: 800; font-size: 13px; color: #64748b; }
        .selected .opt-label { background: var(--gradient-primary); color: white; border-color: transparent; }
        .q-circle { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; background: white; color: #64748b; }
        .q-circle.answered { background: var(--gradient-primary); color: white; border-color: transparent; }
        .opt-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .opt-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .question-block { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px dashed #e2e8f0; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav id="navbar" class="hidden sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg" style="background: var(--gradient-primary);">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-inner font-black text-violet-600">A</div>
            <span class="font-extrabold text-2xl tracking-tighter text-white">GAYZOTA <span class="font-light opacity-80">8A7</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="userDisplay" class="hidden md:block text-sm font-bold text-white bg-white/20 px-4 py-2 rounded-full"></span>
            <button onclick="location.reload()" class="text-white/80 hover:text-white p-2">Đăng xuất</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- Đăng nhập -->
        <div id="loginPage" class="mt-24 max-w-md mx-auto glass-card p-10">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black tracking-tighter uppercase italic text-gradient">GAYZOTA <span class="text-gray-300 font-light">v3.0</span></h1>
            </div>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl border border-gray-200 outline-none">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl border border-gray-200 outline-none">
                <button onclick="handleLogin()" class="w-full btn-gradient font-bold py-4 rounded-2xl">ĐĂNG NHẬP</button>
                <div id="loginError" class="text-red-500 text-xs font-bold text-center hidden">Sai tài khoản!</div>
            </div>
        </div>

        <!-- Menu -->
        <div id="mainMenu" class="hidden mt-10 space-y-8">
            <div class="glass-card p-10 text-center text-white" style="background: var(--gradient-primary);">
                <h2 class="text-3xl font-extrabold">Chào mừng, <span id="welcomeUser"></span>! 👋</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="showSection('selectExamPage')" class="glass-card p-8 flex flex-col items-center">Vào thi ngay</button>
                <button onclick="showSection('resultBoard')" class="glass-card p-8 flex flex-col items-center">Bảng vàng</button>
                <button id="adminBtn" onclick="showSection('adminPage')" class="hidden glass-card p-8 flex flex-col items-center">Quản lý đề</button>
            </div>
        </div>

        <!-- Chọn đề -->
        <div id="selectExamPage" class="hidden mt-6">
            <button onclick="showSection('mainMenu')" class="mb-4 text-gray-500">← Quay lại</button>
            <div id="userExamList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- Trang thi -->
        <div id="examPage" class="hidden mt-4">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3"><div id="questionsContainer" class="glass-card p-8 md:p-12"></div></div>
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass-card p-8 text-center sticky top-24">
                        <div id="timerDisplay" class="text-5xl font-black text-gradient mb-6">15:00</div>
                        <button onclick="finishExam()" class="w-full py-4 bg-red-500 text-white rounded-2xl font-bold">NỘP BÀI</button>
                    </div>
                    <div id="questionMap" class="glass-card p-6 flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>

        <!-- Kết quả -->
        <div id="resultPage" class="hidden mt-10 max-w-2xl mx-auto text-center glass-card p-16">
            <div id="finalScore" class="text-8xl font-black text-gradient mb-4">0</div>
            <p id="statCorrect" class="text-xl font-bold mb-8"></p>
            <p id="roastMessage" class="text-2xl italic mb-10"></p>
            <div class="flex gap-4">
                <button onclick="showReview()" class="flex-1 p-4 bg-gray-100 rounded-xl">Xem đáp án</button>
                <button onclick="showSection('mainMenu')" class="flex-1 p-4 bg-slate-800 text-white rounded-xl">Trang chủ</button>
            </div>
        </div>

        <!-- Review -->
        <div id="reviewPage" class="hidden mt-6 space-y-6" id="reviewContent"></div>

        <!-- Admin -->
        <div id="adminPage" class="hidden mt-6 glass-card p-10 max-w-4xl mx-auto">
            <button onclick="showSection('mainMenu')" class="mb-6 text-gray-500">← Quay lại</button>
            <h2 class="text-3xl font-black mb-8">QUẢN LÝ ĐỀ THI</h2>
            <div class="space-y-4">
                <input type="hidden" id="editingId">
                <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full p-4 rounded-xl border">
                <textarea id="rawInput" class="w-full h-64 p-5 rounded-xl border font-mono text-sm" placeholder="Câu 1: ...&#10;A. ... @t&#10;B. ..."></textarea>
                <div class="flex items-center justify-between">
                    <button onclick="saveExamAction()" class="bg-slate-800 text-white px-10 py-4 rounded-xl font-bold">LƯU LÊN MÂY</button>
                    <span id="saveStatus" class="font-bold text-green-600 hidden italic">Đã lưu đề xong! ✓</span>
                </div>
            </div>
            <div id="adminExamListContent" class="mt-10 space-y-3"></div>
        </div>

        <!-- Bảng vàng -->
        <div id="resultBoard" class="hidden mt-10 glass-card p-10 max-w-4xl mx-auto">
            <button onclick="showSection('mainMenu')" class="mb-6 text-gray-500">← Quay lại</button>
            <div id="resultTableBody"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://owfudlqolibgipsbtejm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZnVkbHFvbGliZ2lwc2J0ZWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTU2NzMsImV4cCI6MjA4ODYzMTY3M30.3gBJy-umboXye70MKe7rqTOtseW0Ay1kBfBI_FPrZoE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USERS = { 'mrduc': 'admin8a7', 'hoanggay': 'missgay', 'hocsinh': '123456' };
        let exams = [], state = { user: '', exam: null, timer: null, time: 900, userAnswers: [] };

        async function syncDB() {
            const { data: ex } = await _supabase.from('exams').select('*').order('id', { ascending: false });
            if(ex) exams = ex;
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                document.getElementById('userDisplay').innerText = `Chào, ${u.toUpperCase()}`;
                document.getElementById('welcomeUser').innerText = u.toUpperCase();
                document.getElementById('navbar').classList.remove('hidden');
                if(u === 'mrduc' || u === 'hoanggay') document.getElementById('adminBtn').classList.remove('hidden');
                await syncDB();
                showSection('mainMenu');
            } else document.getElementById('loginError').classList.remove('hidden');
        }

        function showSection(id) {
            document.querySelectorAll('body > div > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'resultBoard') renderResultBoard();
        }

        // --- ADMIN: LƯU & SỬA ---
        async function saveExamAction() {
            const id = document.getElementById('editingId').value;
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;

            const questions = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5).map(b => {
                const lines = b.trim().split('\n');
                return { q: lines[0].trim(), opts: lines.slice(1).map(l => ({ t: l.replace('@t','').substring(2).trim(), c: l.includes('@t') })) };
            });

            let res;
            if(id) {
                res = await _supabase.from('exams').update({ title, questions }).eq('id', id);
            } else {
                res = await _supabase.from('exams').insert([{ title, questions }]);
            }

            if(!res.error) {
                const status = document.getElementById('saveStatus');
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 3000);
                document.getElementById('examTitle').value = '';
                document.getElementById('rawInput').value = '';
                document.getElementById('editingId').value = '';
                await syncDB();
                renderAdminExams();
            }
        }

        function renderAdminExams() {
            document.getElementById('adminExamListContent').innerHTML = exams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-white border rounded-xl">
                    <span class="font-bold">${ex.title}</span>
                    <div class="flex gap-4">
                        <button onclick="editExam(${ex.id})" class="text-blue-600 font-bold">SỬA</button>
                        <button onclick="deleteExam(${ex.id})" class="text-red-500 font-bold">XÓA</button>
                    </div>
                </div>
            `).join('');
        }

        function editExam(id) {
            const ex = exams.find(e => e.id === id);
            document.getElementById('editingId').value = ex.id;
            document.getElementById('examTitle').value = ex.title;
            let raw = ex.questions.map((q, i) => {
                let opts = q.opts.map((o, j) => `${String.fromCharCode(65+j)}. ${o.t} ${o.c ? '@t' : ''}`).join('\n');
                return `Câu ${i+1}: ${q.q}\n${opts}`;
            }).join('\n\n');
            document.getElementById('rawInput').value = raw;
            window.scrollTo(0,0);
        }

        async function deleteExam(id) {
            if(confirm("Xóa đề này vĩnh viễn?")) {
                await _supabase.from('exams').delete().eq('id', id);
                await syncDB(); renderAdminExams();
            }
        }

        // --- THI ---
        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = exams.map(ex => `
                <button onclick="startExam(${ex.id})" class="glass-card p-8 text-left">
                    <div class="font-black text-xl mb-2">${ex.title}</div>
                    <div class="text-sm text-gray-400 font-bold">${ex.questions?.length || 0} CÂU | 15 PHÚT</div>
                </button>
            `).join('');
        }

        function startExam(id) {
            state.exam = exams.find(e => e.id === id);
            state.time = 900;
            state.userAnswers = new Array(state.exam.questions.length).fill(null);
            showSection('examPage');
            renderQuestions();
            startTimer();
        }

        function startTimer() {
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.time <= 0) finishExam();
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = state.exam.questions.map((q, qIdx) => `
                <div id="q-block-${qIdx}" class="question-block">
                    <div class="font-bold text-violet-600 mb-2">Câu ${qIdx+1}</div>
                    <div class="text-xl font-bold mb-6">${q.q}</div>
                    ${q.opts.map((o, i) => `
                        <button onclick="selectOption(${qIdx}, ${i})" class="opt-btn ${state.userAnswers[qIdx]?.selected === o.t ? 'selected' : ''}">
                            <div class="opt-label">${String.fromCharCode(65+i)}</div><div>${o.t}</div>
                        </button>
                    `).join('')}
                </div>
            `).join('');
            renderMap();
        }

        function selectOption(qIdx, optIdx) {
            const q = state.exam.questions[qIdx]; const o = q.opts[optIdx];
            state.userAnswers[qIdx] = { q: q.q, selected: o.t, opts: q.opts, isRight: o.c };
            renderQuestions();
        }

        function renderMap() {
            document.getElementById('questionMap').innerHTML = state.exam.questions.map((_, i) => `
                <div class="q-circle ${state.userAnswers[i]?'answered':''}" onclick="document.getElementById('q-block-${i}').scrollIntoView()">${i+1}</div>
            `).join('');
        }

        async function finishExam() {
            clearInterval(state.timer);
            const corrects = state.userAnswers.filter(a => a?.isRight).length;
            const score = Math.round((corrects / state.exam.questions.length) * 100) / 10;
            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('statCorrect').innerText = `Đúng ${corrects}/${state.exam.questions.length} câu`;
            
            // Roast
            const msg = score === 10 ? "CHEATER! 🤡" : (score >= 5 ? "KHÁ ĐẤY! 🔥" : "NGU THẾ! 🤓");
            document.getElementById('roastMessage').innerText = msg;

            await _supabase.from('history').insert([{ name: state.user, exam: state.exam.title, score, date: new Date().toLocaleDateString('vi-VN') }]);
        }

        function showReview() {
            showSection('reviewPage');
            document.getElementById('reviewPage').innerHTML = `
                <button onclick="showSection('resultPage')" class="p-4 bg-gray-200 rounded-xl mb-6">← Quay lại</button>
                ${state.userAnswers.map((ans, i) => `
                    <div class="glass-card p-6 mb-4">
                        <div class="font-bold mb-4">Câu ${i+1}: ${ans?.q || 'Bỏ trống'}</div>
                        ${(ans?.opts || []).map(o => `
                            <div class="p-3 border rounded-lg mb-2 ${o.c ? 'opt-correct' : (o.t === ans?.selected ? 'opt-wrong' : '')}">${o.t}</div>
                        `).join('')}
                    </div>
                `).join('')}
            `;
        }

        async function renderResultBoard() {
            const { data } = await _supabase.from('history').select('*').order('score', { ascending: false });
            document.getElementById('resultTableBody').innerHTML = (data || []).map((h, i) => `
                <div class="flex justify-between items-center p-4 border-b">
                    <div><span class="font-black mr-4">${i+1}.</span> <span class="font-bold">${h.name.toUpperCase()}</span></div>
                    <div class="font-black text-2xl text-violet-600">${h.score}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
