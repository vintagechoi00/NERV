<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA SUPREME - 8A7 PRIVATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #c084fc; --secondary: #22d3ee; --bg: #0f172a; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f1f5f9; min-height: 100vh; user-select: none;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px;
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 800; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(192, 132, 252, 0.4);
        }
        .btn-premium:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 35px -10px rgba(34, 211, 238, 0.5); }
        .opt-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 18px 24px; border-radius: 18px; cursor: pointer; transition: 0.2s;
        }
        .opt-card:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--secondary); }
        .opt-card.selected {
            background: linear-gradient(90deg, rgba(192, 132, 252, 0.2), rgba(34, 211, 238, 0.2));
            border-color: var(--secondary); box-shadow: inset 0 0 15px rgba(34, 211, 238, 0.1);
        }
        .nav-dot {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: rgba(255, 255, 255, 0.05); font-weight: 800; transition: 0.3s;
        }
        .nav-dot.active { background: var(--secondary); color: #0f172a; box-shadow: 0 0 15px var(--secondary); }
        input, textarea { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app" class="p-4 md:p-10 max-w-7xl mx-auto">
        <header id="header" class="hidden flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div onclick="showSection('mainMenu')" class="h-12 w-12 bg-gradient-to-tr from-purple-500 to-cyan-400 rounded-2xl rotate-12 flex items-center justify-center font-black text-white text-2xl cursor-pointer">G</div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">GAYZOTA <span class="text-cyan-400">SUPREME</span></h1>
                    <p id="userTag" class="text-[10px] font-bold opacity-50 uppercase tracking-[0.2em]"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showSection('mainMenu')" class="glass px-6 py-2 text-xs font-bold hover:bg-white/10 transition">MENU</button>
                <button onclick="location.reload()" class="glass px-6 py-2 text-xs font-bold hover:bg-red-500/20 transition">ĐĂNG XUẤT</button>
            </div>
        </header>

        <div id="loginPage" class="max-w-md mx-auto mt-20 glass p-10 shadow-2xl">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black mb-2 tracking-tighter italic">V3.5 <span class="text-cyan-400">PRO</span></h2>
                <p class="text-slate-400 text-sm">Hệ thống khảo sát năng lực 8A7</p>
            </div>
            <div class="space-y-5">
                <input type="text" id="username" placeholder="Tên thí sinh..." class="w-full p-4 rounded-2xl outline-none">
                <input type="text" id="userClass" placeholder="Lớp (VD: 8A7)..." class="w-full p-4 rounded-2xl outline-none">
                <button onclick="handleLogin()" class="w-full btn-premium py-5 rounded-2xl text-lg mt-4">KẾT NỐI HỆ THỐNG</button>
            </div>
        </div>

        <div id="mainMenu" class="hidden grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="showSection('selectExamPage')" class="glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-cyan-400">
                <div class="text-6xl mb-6">🔥</div><h3 class="text-2xl font-black">VÀO THI</h3>
            </div>
            <div onclick="showSection('leaderboard')" class="glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-purple-400">
                <div class="text-6xl mb-6">💎</div><h3 class="text-2xl font-black">BẢNG VÀNG</h3>
            </div>
            <div id="adminBtn" onclick="showSection('adminPage')" class="hidden glass p-12 flex flex-col items-center group cursor-pointer border-b-4 border-dashed border-slate-400">
                <div class="text-6xl mb-6">⚙️</div><h3 class="text-2xl font-black">QUẢN TRỊ</h3>
            </div>
        </div>

        <div id="selectExamPage" class="hidden">
            <h2 class="text-4xl font-black mb-10">CHỌN <span class="text-cyan-400">ĐỀ THI</span></h2>
            <div id="examList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="examPage" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1 glass p-8 md:p-12"><div id="questionArea"></div></div>
                <div class="w-full lg:w-80 space-y-6">
                    <div class="glass p-8 text-center">
                        <div id="timer" class="text-5xl font-black text-cyan-400 tracking-tighter">15:00</div>
                        <button onclick="submitExam()" class="w-full mt-6 py-4 bg-red-500 rounded-2xl font-black">NỘP BÀI</button>
                    </div>
                    <div class="glass p-6"><div id="questionMap" class="flex flex-wrap gap-2"></div></div>
                </div>
            </div>
        </div>

        <div id="adminPage" class="hidden max-w-4xl mx-auto glass p-10">
            <h2 class="text-3xl font-black mb-8 italic text-cyan-400">ADMIN PANEL</h2>
            <div class="space-y-6">
                <input type="text" id="examTitle" placeholder="Tiêu đề đề thi..." class="w-full p-5 rounded-2xl outline-none">
                <textarea id="rawInput" rows="10" class="w-full p-5 rounded-2xl font-mono text-sm outline-none" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án sai&#10;B. Đáp án đúng @t"></textarea>
                <button onclick="handleSaveExam()" class="w-full btn-premium py-5 rounded-2xl">XUẤT BẢN ĐỀ THI</button>
                <div id="adminExamList" class="pt-10 space-y-3"></div>
            </div>
        </div>

        <div id="leaderboard" class="hidden max-w-4xl mx-auto glass p-10">
            <h2 class="text-4xl font-black mb-10 text-center italic">TOP <span class="text-cyan-400">8A7</span> MASTERS</h2>
            <div id="leaderboardContent" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fzlbtemrspagisfjvaxs.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bGJ0ZW1yc3BhZ2lzZmp2YXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzUzNjQsImV4cCI6MjA4OTQxMTM2NH0.-LXJQxRZKZOFgQO9NhURTQC3nztcKQ0Ir62kHuup1ek';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        const ADMINS = ['mrduc', 'hoanggay'];
        let state = { user: '', class: '', exams: [], currentExam: null, userAns: [], timer: null, time: 900 };

        async function handleLogin() {
            const n = document.getElementById('username').value.trim();
            const c = document.getElementById('userClass').value.trim();
            if(!n || !c) return;
            state.user = n; state.class = c;
            document.getElementById('userTag').innerText = `${n} // ${c}`;
            if(ADMINS.includes(n.toLowerCase())) document.getElementById('adminBtn').classList.remove('hidden');
            await fetchExams();
            showSection('mainMenu');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('header').classList.add('flex');
        }

        async function fetchExams() {
            const { data } = await _sb.from('exams').select('*').order('id', { ascending: false });
            state.exams = data || [];
        }

        function showSection(id) {
            ['loginPage', 'mainMenu', 'selectExamPage', 'examPage', 'adminPage', 'leaderboard'].forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderExamList();
            if(id === 'adminPage') renderAdminExams();
            if(id === 'leaderboard') renderLeaderboard();
        }

        function renderExamList() {
            document.getElementById('examList').innerHTML = state.exams.map(ex => `
                <div onclick="startExam(${ex.id})" class="glass p-8 cursor-pointer border-l-4 border-cyan-400 hover:bg-white/5 transition">
                    <h3 class="text-xl font-bold">${ex.title}</h3>
                    <p class="text-xs opacity-50 mt-2 uppercase tracking-widest">${ex.questions.length} CÂU HỎI | 15 PHÚT</p>
                </div>
            `).join('');
        }

        function startExam(id) {
            const ex = state.exams.find(e => e.id === id);
            state.currentExam = { ...ex, questions: [...ex.questions].sort(() => Math.random() - 0.5) };
            state.userAns = new Array(ex.questions.length).fill(null);
            showSection('examPage');
            renderQuestion(0);
            startTimer();
        }

        function renderQuestion(idx) {
            const q = state.currentExam.questions[idx];
            document.getElementById('questionArea').innerHTML = `
                <span class="text-cyan-400 font-black text-xs tracking-widest uppercase">CÂU HỎI ${idx + 1} / ${state.currentExam.questions.length}</span>
                <h2 class="text-3xl font-bold mt-6 mb-12">${q.q}</h2>
                <div class="grid grid-cols-1 gap-4">
                    ${q.opts.map((o, oi) => `
                        <div onclick="pick(${idx}, ${oi})" class="opt-card ${state.userAns[idx] === oi ? 'selected' : ''}">
                            <span class="font-bold mr-4 text-cyan-400">${String.fromCharCode(65+oi)}.</span> ${o.t}
                        </div>
                    `).join('')}
                </div>
            `;
            renderMap(idx);
        }

        function pick(qi, oi) { state.userAns[qi] = oi; renderQuestion(qi); }

        function renderMap(current) {
            document.getElementById('questionMap').innerHTML = state.userAns.map((a, i) => `
                <div onclick="renderQuestion(${i})" class="nav-dot cursor-pointer ${current === i ? 'active' : (a !== null ? 'bg-white/20' : '')}">${i+1}</div>
            `).join('');
        }

        function startTimer() {
            state.time = 900;
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time/60), s = state.time%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.time <= 0) submitExam();
            }, 1000);
        }

        async function submitExam() {
            clearInterval(state.timer);
            let score = 0;
            state.currentExam.questions.forEach((q, i) => {
                if(state.userAns[i] !== null && q.opts[state.userAns[i]].c) score++;
            });
            const finalScore = Math.round((score / state.currentExam.questions.length) * 10 * 10) / 10;
            
            await _sb.from('history').insert([{
                name: `${state.user} (${state.class})`,
                exam: state.currentExam.title,
                score: finalScore,
                date: new Date().toLocaleDateString('vi-VN')
            }]);

            const appEl = document.getElementById('app');
            const oldContent = appEl.innerHTML;
            appEl.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center text-center">
                    <h2 class="text-cyan-400 font-black tracking-[0.5em] mb-4">COMPLETED</h2>
                    <div class="text-[150px] font-black italic text-white" id="finalScoreDisplay">0</div>
                    <button onclick="location.reload()" class="btn-premium px-12 py-5 rounded-full mt-10">KẾT THÚC</button>
                </div>
            `;
            gsap.to("#finalScoreDisplay", { innerText: finalScore, duration: 2, snap: { innerText: 0.1 } });
        }

        async function handleSaveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return alert("Nhập đủ đi sếp!");

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return {
                    q: lines[0].trim(),
                    opts: lines.slice(1).map(l => ({
                        t: l.replace('@t','').replace(/^[A-Z0-9][.:]\s*/i, '').trim(),
                        c: l.includes('@t')
                    }))
                };
            });

            const { error } = await _sb.from('exams').insert([{ title, questions }]);
            if(error) alert("Lỗi: " + error.message);
            else { 
                alert("Đã lên sóng!"); 
                await fetchExams(); // Cập nhật lại danh sách đề
                showSection('mainMenu'); // Quay về menu thay vì load lại trang
            }
        }

        async function renderLeaderboard() {
            const { data } = await _sb.from('history').select('*').order('score', { ascending: false }).limit(20);
            document.getElementById('leaderboardContent').innerHTML = (data || []).map((h, i) => `
                <div class="glass p-5 flex justify-between items-center">
                    <div class="flex items-center gap-5">
                        <span class="text-2xl font-black ${i<3?'text-cyan-400':'opacity-20'}">#${i+1}</span>
                        <div><p class="font-bold uppercase text-sm">${h.name}</p><p class="text-[10px] opacity-40 uppercase">${h.exam}</p></div>
                    </div>
                    <div class="text-3xl font-black text-cyan-400">${h.score}</div>
                </div>
            `).join('');
        }

        async function renderAdminExams() {
            document.getElementById('adminExamList').innerHTML = state.exams.map(ex => `
                <div class="flex justify-between p-4 glass text-sm">
                    <span>${ex.title}</span>
                    <button onclick="deleteEx(${ex.id})" class="text-red-400 font-bold">XÓA</button>
                </div>
            `).join('');
        }

        async function deleteEx(id) {
            if(confirm("Xóa thật hả?")) {
                const { error } = await _sb.from('exams').delete().eq('id', id);
                if(!error) {
                    await fetchExams();
                    renderAdminExams();
                }
            }
        }
    </script>
</body>
</html>
