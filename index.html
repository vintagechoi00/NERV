<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; }
        .glass-card { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .link-style { font-weight: bold; text-decoration: underline; cursor: pointer; font-style: italic; text-transform: uppercase; }
        
        /* THÔNG BÁO CHỮ XANH LÁ (THAY CHO ALERT) */
        #toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;
            padding: 12px 30px; border-radius: 50px; font-size: 14px; font-weight: bold;
            z-index: 9999; transition: 0.4s ease; opacity: 0;
        }
        #toast.active { bottom: 30px; opacity: 1; }

        .opt-btn { border: 2px solid #f1f5f9; width: 100%; text-align: left; padding: 16px; border-radius: 18px; font-weight: 600; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="toast">Đã tạo đề thành công!</div>

    <!-- MENU CHÍNH (GIỮ NGUYÊN GIAO DIỆN CŨ) -->
    <div id="mainMenu" class="glass-card p-12 w-full max-w-lg mt-20 text-center">
        <p class="text-gray-300 text-[10px] font-bold uppercase tracking-[0.3em] mb-10">Lựa chọn chức năng</p>
        <div class="flex flex-col items-center space-y-8">
            <div onclick="showSection('adminPage')" class="link-style text-lg text-orange-500">
                📝 QUẢN LÝ ĐỀ THI (ADMIN)
            </div>
            <div onclick="showSection('selectExamPage')" class="link-style text-xl text-[#8b5cf6]">
                ✍️ VÀO THI NGAY (AUTO XÁO)
            </div>
        </div>
    </div>

    <!-- QUẢN LÝ ĐỀ (ADMIN) -->
    <div id="adminPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
        <div onclick="showSection('mainMenu')" class="text-[10px] font-black text-gray-400 mb-6 cursor-pointer uppercase tracking-widest">← Quay lại menu</div>
        <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full mb-4 p-3 border rounded-xl outline-none">
        <textarea id="rawInput" class="w-full h-48 mb-4 p-3 border rounded-xl font-mono text-sm outline-none" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án 1&#10;B. Đáp án đúng @t"></textarea>
        <button onclick="saveExam()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl uppercase text-xs">LƯU ĐỀ VÀO MÁY</button>
        <div id="adminExamList" class="mt-6 space-y-2"></div>
    </div>

    <!-- CHỌN ĐỀ -->
    <div id="selectExamPage" class="glass-card p-10 w-full max-w-lg hidden mt-4 text-center">
        <div onclick="showSection('mainMenu')" class="text-[10px] font-black text-gray-400 mb-8 cursor-pointer uppercase tracking-widest">← Quay lại</div>
        <div id="userExamList" class="flex flex-col space-y-6"></div>
    </div>

    <!-- LÀM BÀI -->
    <div id="examView" class="w-full max-w-2xl hidden mt-4">
        <div class="glass-card p-8">
            <h3 id="qText" class="text-lg font-bold mb-6 italic"></h3>
            <div id="optionsArea"></div>
        </div>
    </div>

    <script>
        let allExams = JSON.parse(localStorage.getItem('g_exams')) || [];
        let state = { shuffledQs: [], currentIdx: 0, corrects: 0 };

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        function showSection(id) {
            document.querySelectorAll('body > div:not(#toast)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return notify("Vui lòng nhập đủ đề!");

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return {
                    qText: lines[0].trim(),
                    opts: lines.slice(1).map(l => ({
                        text: l.replace('@t', '').trim().substring(2).trim(),
                        isCorrect: l.includes('@t')
                    }))
                };
            });
            allExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            notify("Đã tạo đề thành công!"); // Hiện chữ xanh lá ở dưới
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg text-xs italic">
                    <span>${ex.title}</span>
                    <button onclick="deleteExam(${ex.id})" class="text-red-400 font-bold">XÓA</button>
                </div>
            `).join('');
        }

        function deleteExam(id) {
            allExams = allExams.filter(e => e.id !== id);
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            renderAdmin();
            notify("Đã xóa!");
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="link-style text-lg text-[#8b5cf6]" onclick="startExam(${ex.id})">${ex.title}</div>
            `).join('') || 'Chưa có đề';
        }

        function startExam(id) {
            const exam = allExams.find(e => e.id === id);
            state.currentIdx = 0; state.corrects = 0;
            state.shuffledQs = [...exam.questions].sort(() => Math.random() - 0.5);
            showSection('examView');
            loadQuestion();
        }

        function loadQuestion() {
            const q = state.shuffledQs[state.currentIdx];
            document.getElementById('qText').innerText = q.qText;
            const area = document.getElementById('optionsArea');
            area.innerHTML = '';
            
            [...q.opts].sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('div');
                b.className = 'opt-btn italic';
                b.innerText = opt.text;
                b.onclick = function() {
                    if(area.style.pointerEvents === 'none') return;
                    area.style.pointerEvents = 'none';
                    this.style.borderColor = opt.isCorrect ? '#22c55e' : '#ef4444';
                    if(opt.isCorrect) state.corrects++;
                    
                    setTimeout(() => {
                        state.currentIdx++;
                        area.style.pointerEvents = 'auto';
                        if(state.currentIdx < state.shuffledQs.length) loadQuestion();
                        else {
                            notify("Hoàn thành bài thi!");
                            showSection('mainMenu');
                        }
                    }, 500);
                };
                area.appendChild(b);
            });
        }
    </script>
</body>
</html>
